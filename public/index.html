<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barter Box · управление бартер-рассылками, доставкой и маркетингом</title>
<style>
:root{
  --blue:#2fc6f6;
  --action:#338af3;
  --action-d:#2679dd;
  --canvas:#eef2f5;
  --panel:#ffffff;
  --ink:#2c333a;
  --ink-soft:#5b6670;
  --ink-mute:#8a949c;
  --line:#e2e7ec;
  --line-2:#d5dbe0;
  --ok:#3fae53;
  --ok-bg:#e8f7ec;
  --warn:#e08a1f;
  --warn-bg:#fdf2e1;
  --bad:#d94f4f;
  --bad-bg:#fbe9e9;
  --plan:#7b6fd0;
  --plan-bg:#efecfb;
  --radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  background:var(--canvas);color:var(--ink);font-size:13.5px;line-height:1.45;
  -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;cursor:pointer}
.link-btn{background:none;border:none;padding:0;margin:0;font:inherit;color:var(--action);cursor:pointer;text-align:left}
.link-btn:hover{text-decoration:underline;color:var(--action-d)}
input,select,textarea{font-family:inherit;font-size:13.5px}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-thumb{background:#c7cfd6;border-radius:4px}

#app{min-height:100vh;display:flex;flex-direction:column}

.topbar{
  background:#fff;border-bottom:1px solid var(--line-2);
  display:flex;align-items:center;gap:14px;padding:0 18px;height:54px;
  position:sticky;top:0;z-index:50;
}
.logo{display:flex;align-items:center;gap:9px;font-weight:700;font-size:15px;white-space:nowrap}
.logo .mark{
  width:28px;height:28px;border-radius:7px;
  background:linear-gradient(135deg,var(--blue),var(--action));
  display:grid;place-items:center;color:#fff;font-weight:700;font-size:14px;
}
.top-spacer{flex:1}
.role-pill{font-size:12px;color:var(--ink-soft);background:#eef3f7;border-radius:20px;padding:6px 12px;font-weight:600;display:flex;align-items:center;gap:6px}
.conn-dot{width:8px;height:8px;border-radius:50%;background:var(--ok);display:inline-block}
.conn-dot.off{background:var(--bad)}
.btn{
  border:none;border-radius:9px;padding:8px 14px;font-weight:600;font-size:12.8px;
  display:inline-flex;align-items:center;gap:6px;transition:.15s;white-space:nowrap;
}
.btn-primary{background:var(--action);color:#fff}
.btn-primary:hover{background:var(--action-d)}
.btn-ghost{background:#eef3f7;color:var(--ink-soft)}
.btn-ghost:hover{background:#e2e9ef}
.btn-danger{background:var(--bad-bg);color:var(--bad)}
.btn-danger:hover{background:#f6d9d9}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:7px}
.btn:disabled{opacity:.45;cursor:not-allowed}

.tabs{
  background:#fff;border-bottom:1px solid var(--line-2);
  display:flex;gap:2px;padding:0 18px;overflow-x:auto;
}
.tab{
  border:none;background:none;font-size:13px;color:var(--ink-soft);font-weight:600;
  padding:12px 14px;position:relative;white-space:nowrap;
}
.tab.active{color:var(--action)}
.tab.active::after{content:"";position:absolute;left:10px;right:10px;bottom:0;height:3px;background:var(--blue);border-radius:3px 3px 0 0}
.tab .cnt{background:#eef3f7;color:var(--ink-mute);border-radius:9px;font-size:10.5px;padding:1px 6px;margin-left:5px;font-weight:700}

main{flex:1;padding:18px;max-width:1400px;width:100%;margin:0 auto}
.hide{display:none !important}

.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:14px}
.panel-title{font-size:14.5px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px;justify-content:space-between;flex-wrap:wrap}
.grid-kpi{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:14px}
.kpi{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:14px}
.kpi .num{font-size:22px;font-weight:700}
.kpi .lbl{font-size:11.5px;color:var(--ink-mute);margin-top:2px}
.kpi.ok .num{color:var(--ok)}
.kpi.warn .num{color:var(--warn)}
.kpi.bad .num{color:var(--bad)}

.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.toolbar input[type=text],.toolbar input[type=search],.toolbar select{
  border:1px solid var(--line-2);border-radius:8px;padding:7px 10px;background:#fff;color:var(--ink);
}
.toolbar .fill{flex:1;min-width:140px}
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.field label{font-size:11.5px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.02em}
.field input,.field select,.field textarea{border:1px solid var(--line-2);border-radius:8px;padding:8px 10px;background:#fff;width:100%}
.field textarea{resize:vertical;min-height:60px}
.form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}

.table-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--radius)}
table{width:100%;border-collapse:collapse;font-size:12.8px;background:#fff}
th,td{padding:8px 10px;text-align:left;border-bottom:1px solid var(--line);white-space:nowrap}
th{background:#f7f9fb;color:var(--ink-soft);font-size:11.3px;text-transform:uppercase;letter-spacing:.02em;position:sticky;top:0}
tr:hover td{background:#fafcfe}
td.wrap{white-space:normal;max-width:220px}
.rowcheck{width:26px}

/* Инлайн-редактирование ячеек таблицы "по-экселевски" (клик по значению — не по карандашу).
   .inline-edit — обёртка над отображаемым значением; при клике превращается в input/select. */
.inline-edit{cursor:text;border-radius:4px;padding:1px 4px;margin:-1px -4px;display:inline-block}
.inline-edit:hover{background:#eef6ff;outline:1px dashed var(--action)}
.inline-edit.editing{background:none;outline:none;padding:0;margin:0}
.inline-edit-input{border:1px solid var(--action);border-radius:5px;padding:3px 6px;font:inherit;background:#fff;width:100%;min-width:70px}
select.inline-edit-input{cursor:pointer}

.badge{display:inline-flex;align-items:center;gap:4px;border-radius:20px;padding:3px 10px;font-size:11.5px;font-weight:700}
.badge-progress{background:#e5eefb;color:var(--action)}
.badge-success{background:var(--ok-bg);color:var(--ok)}
.badge-problem{background:var(--warn-bg);color:var(--warn)}
.badge-closed{background:#eee;color:var(--ink-mute)}
.badge-plan{background:var(--plan-bg);color:var(--plan)}
.dot{width:7px;height:7px;border-radius:50%;background:currentColor;display:inline-block}

.empty{padding:30px;text-align:center;color:var(--ink-mute);font-size:13px}

.modal-back{position:fixed;inset:0;background:rgba(20,25,30,.45);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal{background:#fff;border-radius:14px;max-width:520px;width:100%;max-height:88vh;overflow:auto;padding:20px;box-shadow:0 20px 50px rgba(0,0,0,.25)}
.modal h3{font-size:16px;margin-bottom:14px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;flex-wrap:wrap}

#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#2c333a;color:#fff;padding:10px 18px;border-radius:9px;font-size:13px;z-index:200;opacity:0;pointer-events:none;transition:.25s;max-width:90vw;text-align:center}
#toast.show{opacity:1;transform:translate(-50%,-4px)}
#toast.error{background:var(--bad)}

.login-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:32px;max-width:460px;width:100%;text-align:center}
.login-card .mark{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,var(--blue),var(--action));display:grid;place-items:center;color:#fff;font-weight:700;font-size:22px;margin:0 auto 14px}
.login-card h2{font-size:19px;margin-bottom:6px}
.login-card p{color:var(--ink-soft);font-size:13px;margin-bottom:20px}
.role-choice{display:flex;gap:8px;margin-bottom:18px}
.role-btn{flex:1;border:2px solid var(--line-2);border-radius:12px;padding:14px 6px;background:#fff;font-weight:700;color:var(--ink-soft);transition:.15s;font-size:12.5px}
.role-btn:hover{border-color:var(--blue)}
.role-btn.selected{border-color:var(--action);background:#eef6ff;color:var(--action)}
.login-hint{font-size:11.5px;color:var(--ink-mute);margin-top:10px;text-align:left;background:#f7f9fb;padding:10px 12px;border-radius:8px}

.driver-shell{max-width:480px;margin:0 auto;padding:14px}
.driver-header{background:linear-gradient(135deg,var(--action),var(--blue));color:#fff;border-radius:14px;padding:16px;margin-bottom:14px}
.driver-header .name{font-size:16px;font-weight:700}
.driver-header .sub{font-size:12px;opacity:.9;margin-top:2px}
.driver-stats{display:flex;gap:8px;margin-top:12px}
.driver-stats div{background:rgba(255,255,255,.18);border-radius:9px;padding:8px 10px;flex:1;text-align:center}
.driver-stats .n{font-size:17px;font-weight:700}
.driver-stats .l{font-size:10.5px;opacity:.9}
.order-card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:13px;margin-bottom:10px;display:flex;flex-direction:column;gap:6px}
.order-card .top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.order-card .blogger{font-weight:700;font-size:14px}
.order-card .addr{color:var(--ink-soft);font-size:12.5px}
.order-card .actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.icon-btn{background:#eef3f7;color:var(--ink);border:none;border-radius:8px;padding:8px 10px;font-size:12px;font-weight:600;flex:1;text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:5px}
.icon-btn.call{background:#e8f7ec;color:var(--ok)}
.icon-btn.map{background:#e5eefb;color:var(--action)}
.status-btns{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
.status-btns button{border:none;border-radius:9px;padding:10px;font-weight:700;font-size:12.5px}
.sb-ok{background:var(--ok-bg);color:var(--ok)}
.sb-warn{background:var(--warn-bg);color:var(--warn)}
.photo-preview{width:100%;max-height:160px;object-fit:cover;border-radius:8px;margin-top:8px;border:1px solid var(--line)}
.reason-grid{display:flex;flex-direction:column;gap:6px;margin:10px 0}
.reason-grid button{text-align:left;border:1px solid var(--line-2);background:#fff;border-radius:9px;padding:10px 12px;font-weight:600}
.reason-grid button:hover{border-color:var(--action);color:var(--action)}
.driver-footer{text-align:center;padding:14px;color:var(--ink-mute);font-size:11.5px}

.pbar{height:6px;background:#eef1f4;border-radius:4px;overflow:hidden;margin-top:6px}
.pbar span{display:block;height:100%;background:var(--action)}

@media (max-width:720px){
  main{padding:10px}
  .grid-kpi{grid-template-columns:repeat(2,1fr)}
  .tabs{padding:0 8px}
  .topbar{padding:0 10px}
}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast"></div>

<script>
"use strict";

/* =========================================================================
   1. СПРАВОЧНИКИ (словарь UI — сами данные живут на сервере)
   ========================================================================= */
const STATUS_META = {
  created:    {label:"Создана",               group:"progress"},
  assigned:   {label:"Назначена водителю",     group:"progress"},
  accepted:   {label:"Принята водителем",      group:"progress"},
  in_route:   {label:"В маршруте",             group:"progress"},
  delivered:  {label:"✅ Доставлено",           group:"success"},
  no_answer:  {label:"Не дозвонился",          group:"problem"},
  addr_bad:   {label:"Адрес неактуален",       group:"problem"},
  absent:     {label:"Получатель отсутствует", group:"problem"},
  reschedule: {label:"Перенос доставки",       group:"problem"},
  returned:   {label:"Возврат в офис",         group:"problem"},
  cancelled:  {label:"Отменена",               group:"closed"},
};
const PROBLEM_REASONS = {
  no_answer:  "Не дозвонился",
  addr_bad:   "Адрес изменился",
  absent:     "Нет на месте",
  reschedule: "Перенести",
  returned:   "Возврат в офис",
};
const CLOSURE_TYPES = { writeoff:"Списание", sale:"Реализация" };
const CAMPAIGN_STAGES = [
  "Запланирован","Концепция","Товары выбраны","Упаковка заказана","Упаковка оплачена",
  "Упаковка на складе","Товары в офисе","Скомплектовано","В доставке","Учёт закрыт","Проект закрыт"
];
const RETURN_STATUSES = ["В офисе","Ожидает решения","Оформлен возврат","Принят на складе","Закрыт"];
const BOX_TYPES = ["Уход премиум","Бьюти-бокс","Гаджет-набор"];
// Стоимость логистики за одну доставку — пока фиксированная для всех, проставляется
// автоматически при создании заказа (вручную или через импорт CSV). Если по конкретной
// доставке расходы отличаются — можно поправить прямо в таблице "Отправка блогерам".
const LOGISTICS_COST_DEFAULT = 1500;
const PLATFORMS = ["Instagram Reels","Instagram Stories","TikTok","YouTube Shorts","Отзыв / пост"];
const BLOGGER_TIERS = ["Малый (эффект 1–7 дней)","Крупный (эффект 2–3 недели)"];
const DEAL_STATUSES = ["Запланирована","Опубликована","Оплачена","Закрыта"];
// Инфлюенс интеграции микро/средние (отв. Нина) — платные размещения у мелких/средних блогеров,
// обычно Instagram Reels + TikTok кросспостингом за одну сумму. Без ROMI по продажам (см. server.js).
const MICRO_PAYMENT_STATUSES = ["не оплачено","к оплате","оплачено"];
const MICRO_PRODUCT_STATUSES = ["товар заказан","товар доставлен"];
const MICRO_VIDEO_STATUSES = ["не опубликовано","опубликовано"];
// Акцентный цвет только для стилизованного дашборда "Платный инфлюенс" (не трогает остальной интерфейс).
const INFL_BRAND = "#d6336c";
const INFL_BRAND_LIGHT = "#f9d7e6";
// Тот же стиль дашборда, но для микро/средних — свой акцентный цвет (тил), чтобы визуально не путать с крупными.
const MICRO_BRAND = "#0ca678";
const MICRO_BRAND_LIGHT = "#d3f9d8";

/* =========================================================================
   2. API-КЛИЕНТ — вся запись/чтение идёт на общий сервер, а не в localStorage
   ========================================================================= */
// Сервер теперь проверяет сессию на каждом чувствительном маршруте (см. server.js),
// а не только фронтенд по localStorage — поэтому здесь на каждый запрос
// подставляется Bearer-токен, полученный при входе (UI.authToken).
async function apiFetch(url, options){
  options = options || {};
  const headers = Object.assign({}, options.headers || {});
  if(typeof UI !== "undefined" && UI.authToken) headers["Authorization"] = "Bearer " + UI.authToken;
  options = Object.assign({}, options, {headers});
  let res;
  try{
    res = await fetch(url, options);
  }catch(e){
    throw new Error("Нет связи с сервером. Проверьте интернет и попробуйте ещё раз.");
  }
  let data = null;
  try{ data = await res.json(); }catch(e){ data = null; }
  if(res.status === 401 && typeof UI !== "undefined" && UI.role){
    // Токен стал недействителен (например, сервер перезапускался и потерял сессии
    // в памяти) — а мы до этого считали себя залогиненными. Разлогиниваем сразу,
    // не оставляя человека сидеть с нерабочим токеном.
    forceLogout("Сессия истекла — войдите заново");
  }
  if(!res.ok){
    throw new Error((data && data.error) || `Ошибка запроса (${res.status})`);
  }
  return data;
}
const jsonHeaders = {"Content-Type":"application/json"};

const Api = {
  getState: ()=> apiFetch("/api/state"),
  health: ()=> apiFetch("/api/health"),

  createDriver: (d)=> apiFetch("/api/drivers", {method:"POST", headers:jsonHeaders, body:JSON.stringify(d)}),
  updateDriver: (code, changes)=> apiFetch("/api/drivers/"+encodeURIComponent(code), {method:"PATCH", headers:jsonHeaders, body:JSON.stringify(changes)}),
  deleteDriver: (code)=> apiFetch("/api/drivers/"+encodeURIComponent(code), {method:"DELETE"}),

  createCampaign: (c)=> apiFetch("/api/campaigns", {method:"POST", headers:jsonHeaders, body:JSON.stringify(c)}),
  updateCampaign: (id, changes)=> apiFetch("/api/campaigns/"+id, {method:"PATCH", headers:jsonHeaders, body:JSON.stringify(changes)}),
  deleteCampaign: (id)=> apiFetch("/api/campaigns/"+id, {method:"DELETE"}),

  createOrder: (o)=> apiFetch("/api/orders", {method:"POST", headers:jsonHeaders, body:JSON.stringify(o)}),
  updateOrder: (id, changes)=> apiFetch("/api/orders/"+id, {method:"PATCH", headers:jsonHeaders, body:JSON.stringify(changes)}),
  deleteOrder: (id)=> apiFetch("/api/orders/"+id, {method:"DELETE"}),
  deliverOrder: (id, file, comment)=>{
    const fd = new FormData();
    fd.append("photo", file);
    fd.append("comment", comment || "");
    return apiFetch("/api/orders/"+id+"/deliver", {method:"POST", body: fd});
  },
  problemOrder: (id, statusCode, comment)=> apiFetch("/api/orders/"+id+"/problem", {method:"POST", headers:jsonHeaders, body:JSON.stringify({statusCode, comment})}),
  syncBitrix: (id)=> apiFetch("/api/orders/"+id+"/sync-bitrix", {method:"POST"}),
  bulkAssign: (ids, driverCode)=> apiFetch("/api/orders/bulk-assign", {method:"POST", headers:jsonHeaders, body:JSON.stringify({ids, driverCode})}),
  bulkDelete: (ids)=> apiFetch("/api/orders/bulk-delete", {method:"POST", headers:jsonHeaders, body:JSON.stringify({ids})}),
  importOrders: (rows)=> apiFetch("/api/orders/import", {method:"POST", headers:jsonHeaders, body:JSON.stringify({rows})}),
  geocode: (address, city)=> apiFetch("/api/geocode", {method:"POST", headers:jsonHeaders, body:JSON.stringify({address, city})}),

  createReturn: (r)=> apiFetch("/api/returns", {method:"POST", headers:jsonHeaders, body:JSON.stringify(r)}),
  updateReturn: (id, changes)=> apiFetch("/api/returns/"+id, {method:"PATCH", headers:jsonHeaders, body:JSON.stringify(changes)}),
  deleteReturn: (id)=> apiFetch("/api/returns/"+id, {method:"DELETE"}),

  createPublication: (p)=> apiFetch("/api/publications", {method:"POST", headers:jsonHeaders, body:JSON.stringify(p)}),
  deletePublication: (id)=> apiFetch("/api/publications/"+id, {method:"DELETE"}),
  addMeasurement: (pubId, m)=> apiFetch("/api/publications/"+pubId+"/measurements", {method:"POST", headers:jsonHeaders, body:JSON.stringify(m)}),
  importPublications: (rows)=> apiFetch("/api/publications/import", {method:"POST", headers:jsonHeaders, body:JSON.stringify({rows})}),

  login: (role, login, password)=> apiFetch("/api/auth/login", {method:"POST", headers:jsonHeaders, body:JSON.stringify({role, login, password})}),
  driverLogin: (phone)=> apiFetch("/api/auth/driver-login", {method:"POST", headers:jsonHeaders, body:JSON.stringify({phone})}),
  logout: ()=> apiFetch("/api/auth/logout", {method:"POST"}),

  createDeal: (d)=> apiFetch("/api/influencer-deals", {method:"POST", headers:jsonHeaders, body:JSON.stringify(d)}),
  updateDeal: (id, changes)=> apiFetch("/api/influencer-deals/"+id, {method:"PATCH", headers:jsonHeaders, body:JSON.stringify(changes)}),
  deleteDeal: (id)=> apiFetch("/api/influencer-deals/"+id, {method:"DELETE"}),
  importDeals: (rows)=> apiFetch("/api/influencer-deals/import", {method:"POST", headers:jsonHeaders, body:JSON.stringify({rows})}),

  saveSale: (s)=> apiFetch("/api/sales", {method:"POST", headers:jsonHeaders, body:JSON.stringify(s)}),
  deleteSale: (id)=> apiFetch("/api/sales/"+id, {method:"DELETE"}),
  importSales: (rows)=> apiFetch("/api/sales/import", {method:"POST", headers:jsonHeaders, body:JSON.stringify({rows})}),

  createMicroDeal: (d)=> apiFetch("/api/micro-influencer-deals", {method:"POST", headers:jsonHeaders, body:JSON.stringify(d)}),
  updateMicroDeal: (id, changes)=> apiFetch("/api/micro-influencer-deals/"+id, {method:"PATCH", headers:jsonHeaders, body:JSON.stringify(changes)}),
  deleteMicroDeal: (id)=> apiFetch("/api/micro-influencer-deals/"+id, {method:"DELETE"}),
  importMicroDeals: (rows)=> apiFetch("/api/micro-influencer-deals/import", {method:"POST", headers:jsonHeaders, body:JSON.stringify({rows})}),
};

/* =========================================================================
   3. ЛОКАЛЬНЫЙ КЭШ СОСТОЯНИЯ (обновляется с сервера; все render-функции ниже
   как и раньше читают DataManager.state синхронно — меняется только то,
   ОТКУДА берутся данные и КАК они изменяются)
   ========================================================================= */
const DataManager = {
  state: {drivers:[], campaigns:[], orders:[], returns:[], publications:[], influencerDeals:[], salesByDay:[], microInfluencerDeals:[]},
  async load(){ this.state = await Api.getState(); return this.state; },
  async refresh(){ this.state = await Api.getState(); return this.state; },
  find(collection, id){ return this.state[collection].find(i=> (i.id===id) || (i.code===id)); },
};

let isOnline = true;
function setConnStatus(online){
  isOnline = online;

// Построение маршрута: расстояние по прямой (haversine) + "ближайший сосед" —
// не идеальный TSP, но для десятков точек даёт разумный маршрут без платных API.
// Стартуем с первой точки в списке (обычно верхняя в отфильтрованном по водителю
// списке доставок), дальше на каждом шаге берём ближайшую ещё не посещённую.
function haversineKm(a, b){
  const R = 6371;
  const dLat = (b.lat-a.lat) * Math.PI/180;
  const dLng = (b.lng-a.lng) * Math.PI/180;
  const la1 = a.lat * Math.PI/180, la2 = b.lat * Math.PI/180;
  const h = Math.sin(dLat/2)**2 + Math.cos(la1)*Math.cos(la2)*Math.sin(dLng/2)**2;
  return 2 * R * Math.asin(Math.sqrt(h));
}
function nearestNeighborRoute(points){
  // points: [{id, lat, lng, ...}] — возвращает те же объекты в порядке маршрута
  if(points.length<=1) return points.slice();
  const remaining = points.slice();
  const route = [remaining.shift()];
  while(remaining.length){
    const last = route[route.length-1];
    let bestIdx = 0, bestDist = Infinity;
    remaining.forEach((p,i)=>{
      const d = haversineKm(last, p);
      if(d<bestDist){ bestDist=d; bestIdx=i; }
    });
    route.push(remaining.splice(bestIdx,1)[0]);
  }
  return route;
}

// ---------- Инлайн-редактирование ячеек таблиц ("по-экселевски", без карандаша/модалки) ----------
// inlineEditSpan оборачивает уже отформатированное для показа значение (displayHtml) в <span>,
// который помнит id записи, поле и СЫРОЕ значение (rawValue — без форматирования, именно то,
// что нужно подставить в input при начале редактирования). type — "text"/"number"/"date"/"select";
// для "select" options — массив вариантов (как в <select> в модалках).
function inlineEditSpan(displayHtml, id, field, rawValue, type, options){
  const optAttr = options ? ` data-options="${escapeHtml(JSON.stringify(options))}"` : "";
  return `<span class="inline-edit" data-id="${id}" data-field="${field}" data-type="${type||'text'}" data-value="${escapeHtml(String(rawValue==null?'':rawValue))}"${optAttr}>${displayHtml}</span>`;
}
// Вешается один раз на контейнер (обычно main) после каждого рендера таблицы — находит все
// .inline-edit внутри и по клику подменяет их на input/select. onSave(id, field, value) должен
// сам сохранить через API и перерисовать вкладку (как и остальные обработчики в приложении) —
// сюда просто передаётся то же самое, что уже вызывается из модалок редактирования.
function wireInlineEdit(container, onSave){
  container.querySelectorAll(".inline-edit").forEach(el=>{
    el.onclick = ()=>{
      if(el.classList.contains("editing")) return;
      const id = el.dataset.id, field = el.dataset.field, type = el.dataset.type;
      const options = el.dataset.options ? JSON.parse(el.dataset.options) : null;
      const rawValue = el.dataset.value;
      el.classList.add("editing");
      const originalHtml = el.innerHTML;

      let input;
      if(type==="select"){
        input = document.createElement("select");
        options.forEach(opt=>{
          const o = document.createElement("option");
          o.value = opt; o.textContent = opt;
          if(opt===rawValue) o.selected = true;
          input.appendChild(o);
        });
      } else {
        input = document.createElement("input");
        input.type = type==="number" ? "number" : (type==="date" ? "date" : "text");
        input.value = rawValue;
      }
      input.className = "inline-edit-input";
      el.innerHTML = "";
      el.appendChild(input);
      input.focus();
      if(input.select) input.select();

      let settled = false;
      const revert = ()=>{ el.classList.remove("editing"); el.innerHTML = originalHtml; };
      const commit = async ()=>{
        if(settled) return; settled = true;
        let newVal = input.value;
        if(type==="number") newVal = newVal===""?0:Number(newVal);
        const changed = type==="number" ? Number(newVal)!==Number(rawValue||0) : String(newVal)!==String(rawValue||"");
        if(!changed){ revert(); return; }
        try{
          await onSave(parseInt(id,10), field, newVal);
          el.classList.remove("editing");
        }catch(err){
          toast(err.message, true);
          revert();
        }
      };

      if(type==="select"){
        input.onchange = commit;
        input.onblur = ()=>{ if(!settled) revert(); };
      } else {
        input.onblur = commit;
        input.onkeydown = (e)=>{
          if(e.key==="Enter") input.blur();
          else if(e.key==="Escape"){ settled = true; revert(); }
        };
      }
    };
  });
}
function downloadFile(filename, content, mime){
  const blob = new Blob([content], {type: mime||"text/plain;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
}
function csvEscape(v){
  v = String(v==null?"":v);
  if(/[",\n;]/.test(v)) return '"' + v.replace(/"/g,'""') + '"';
  return v;
}
// Разбирает одну строку CSV с учётом кавычек (RFC4180): запятая/точка с запятой внутри
// "..." не считается разделителем колонок, а "" внутри кавычек — это экранированная кавычка.
// Раньше строка резалась наивным line.split(sep), из-за чего товары с запятой в названии
// (например, "Название, 03 - ... Series, 03") разъезжались по колонкам и портили ШК/выручку.
function parseCsvLine(line, sep){
  // Оставлено для обратной совместимости (используется в тестах и там, где строка уже точно без переносов внутри кавычек).
  return parseCsvRecords(line, sep)[0] || [];
}
// Полностью quote-aware разбор CSV-текста: строки разбиваются по переводу строки ТОЛЬКО вне кавычек,
// поэтому ячейка в кавычках с реальным переносом строки внутри (например, многострочный комментарий
// из Excel) не разрывает запись на несколько "строк" — раньше именно так и происходило, потому что
// текст сначала резался по \r?\n, а кавычки учитывались только после этого.
function parseCsvRecords(text, sep){
  const records = [];
  let row = [], cur = "", inQuotes = false;
  for(let i=0;i<text.length;i++){
    const ch = text[i];
    if(inQuotes){
      if(ch === '"'){
        if(text[i+1] === '"'){ cur += '"'; i++; }
        else inQuotes = false;
      } else cur += ch;
    } else {
      if(ch === '"') inQuotes = true;
      else if(ch === sep){ row.push(cur); cur = ""; }
      else if(ch === "\r"){ /* пропускаем, \n обработает перевод строки */ }
      else if(ch === "\n"){ row.push(cur); records.push(row); row = []; cur = ""; }
      else cur += ch;
    }
  }
  row.push(cur);
  records.push(row);
  return records;
}
function parseCsv(text){
  const firstLine = (text.split(/\r?\n/)[0] || "");
  const sep = firstLine.includes(";") && !firstLine.includes(",") ? ";" : ",";
  const records = parseCsvRecords(text, sep)
    .map(cells=>cells.map(c=>c.trim()))
    .filter(cells=> !(cells.length===1 && cells[0]===""));
  if(!records.length) return [];
  const headers = records[0].map(h=>h.trim().toLowerCase());
  return records.slice(1).map(cells=>{
    const row = {};
    headers.forEach((h,i)=> row[h] = cells[i]!==undefined ? cells[i] : "");
    return row;
  });
}
function fmtNum(v){ return (v===null || v===undefined || v==="") ? "—" : Number(v).toLocaleString("ru-RU"); }

// Проверяет, попадает ли дата (в формате YYYY-MM-DD или ISO-строка) в диапазон [from, to].
// Пустая dateStr при заданном диапазоне считается непопаданием (строка просто не пройдёт фильтр).
function inDateRange(dateStr, from, to){
  if(!from && !to) return true;
  if(!dateStr) return false;
  const d = String(dateStr).slice(0,10);
  if(from && d < from) return false;
  if(to && d > to) return false;
  return true;
}

// Быстрые пресеты периода для фильтра "по неделе / по конкретной дате" на дашборде маркетолога.
function todayStr(){ return new Date().toISOString().slice(0,10); }
function weekRangeStr(){
  const now = new Date();
  const day = now.getDay(); // 0=вс,1=пн...6=сб
  const diffToMonday = day===0 ? -6 : 1-day;
  const monday = new Date(now); monday.setDate(now.getDate()+diffToMonday);
  const sunday = new Date(monday); sunday.setDate(monday.getDate()+6);
  return {from: monday.toISOString().slice(0,10), to: sunday.toISOString().slice(0,10)};
}
function monthRangeStr(){
  const now = new Date();
  const first = new Date(now.getFullYear(), now.getMonth(), 1);
  const last = new Date(now.getFullYear(), now.getMonth()+1, 0);
  return {from: first.toISOString().slice(0,10), to: last.toISOString().slice(0,10)};
}
function erPercent(m){
  if(!m || !m.views) return null;
  return ((m.likes||0)+(m.comments||0)) / m.views * 100;

// Охват: если есть реальный замер просмотров — берём его. Если нет (блогер не поделился
// статистикой в сторис), но заказ уже "доставлено" и публикация уже есть (т.е. блогер
// точно выложил) — считаем оценку как 15% от подписчиков (наша активная аудитория).
// До этого момента (не доставлено или ещё не опубликовано) оценка не считается вообще.
const ACTIVE_AUDIENCE_RATE = 0.15;
function reachInfo(o, pub, m){
  if(m && m.views) return {value:m.views, estimated:false};
  if(o && pub && o.status==="delivered" && pub.publishedAt && o.followers){
    return {value: Math.round(o.followers * ACTIVE_AUDIENCE_RATE), estimated:true};
  }
  return {value:0, estimated:false};
}

}
// Ячейка охвата/ER/кликов/продаж/выручки в таблицах: если публикация уже есть — значение
// кликабельно и открывает то же окно ввода замера (с уже заполненными текущими значениями),
// чтобы не искать отдельную кнопку "+ Данные" в конце строки. Без публикации редактировать
// нечего — там просто "—" без клика.
function editableMeasureCell(pub, orderId, content){

  return `<button class="link-btn rep-add-measure-btn" data-order="${orderId}" title="Изменить охват/ER/клики/продажи">${content}</button>`;

// from/to (необязательные, "YYYY-MM-DD") — фильтр периода по дате публикации (для дашборда
// маркетолога с выбором диапазона/недели/конкретной даты). Без периода — вся история, как раньше.
function marketingSummary(from, to){
  const {orders} = DataManager.state;
  // защита от "осиротевших" публикаций: если заказ был удалён (одиночно или массово) до того,
  // как сервер стал каскадно чистить его публикации, они могли остаться в базе и продолжать
  // попадать в сводку, хотя самого заказа уже нет — отсекаем такие на всякий случай и здесь.
  const orderIds = new Set(orders.map(o=>o.id));
  let publications = DataManager.state.publications.filter(p=>orderIds.has(p.orderId));
  if(from || to) publications = publications.filter(p=>inDateRange(p.publishedAt, from, to));
  const withM = publications.map(p=>({p, m: latestMeasurement(p)})).filter(x=>x.m);
  const totalSales   = withM.reduce((s,x)=>s+(x.m.salesCount||0),0);
  const totalRevenue = withM.reduce((s,x)=>s+(x.m.salesRevenue||0),0);
  const ers = withM.map(x=>erPercent(x.m)).filter(v=>v!=null);
  const avgEr = ers.length ? ers.reduce((a,b)=>a+b,0)/ers.length : null;
  const totalReach = publications.reduce((s,p)=>{
    const o = DataManager.find("orders", p.orderId);
    const m = latestMeasurement(p);
    return s + reachInfo(o, p, m).value;
  }, 0);
  const gap = orders.filter(o=>o.status==="delivered" && !pubOf(o.id));
  // "На доставке" — запланированные рассылки, которые ещё не доставлены и не отменены
  // (созданы/назначены/приняты/в маршруте, включая проблемные статусы — они всё ещё в процессе).
  const onDelivery = orders.filter(o=>o.status!=="delivered" && o.status!=="cancelled").length;
  return {totalReach, totalSales, totalRevenue, avgEr, gap, pubCount: publications.length, onDelivery};
}
// Отчёт по выкладке: не про охваты/продажи (это marketingSummary), а именно про то,
// сколько из доставленного реально выложено блогером — и по каким проектам сильнее
// всего "зависло" (маркетологу нужно дожимать точечно, а не искать в общем списке).
function publicationComplianceSummary(){
  const {orders, campaigns} = DataManager.state;
  const delivered = orders.filter(o=>o.status==="delivered");
  const postedOf = o=>pubOf(o.id);
  const posted = delivered.filter(o=>postedOf(o));
  const withLink = posted.filter(o=>{ const p = postedOf(o); return p && p.link; }).length;
  const withoutLink = posted.length - withLink;
  const waitingCount = delivered.length - posted.length;
  const pct = delivered.length ? Math.round(posted.length/delivered.length*100) : null;

  // Среднее время от доставки до выкладки — только там, где обе даты есть и выкладка не раньше доставки
  // (отрицательные значения обычно означают опечатку в ручной дате, не показательны для средней).
  const lags = posted.map(o=>{
    const p = postedOf(o);
    if(!o.deliveredAt || !p.publishedAt) return null;
    const d = daysBetween(p.publishedAt, o.deliveredAt);
    return d>=0 ? d : null;
  }).filter(v=>v!=null);
  const avgLagDays = lags.length ? lags.reduce((a,b)=>a+b,0)/lags.length : null;

  const now = new Date();
  const daysSince = dateStr=>{
    if(!dateStr) return null;
    return Math.floor((now.getTime() - new Date(dateStr).getTime())/86400000);
  };
  const waitingOrders = delivered.filter(o=>!postedOf(o));
  const ageBuckets = {fresh:0, mid:0, stale:0}; // 0-3 / 4-7 / 8+ дней с доставки
  waitingOrders.forEach(o=>{
    const days = daysSince(o.deliveredAt);
    if(days==null) return;
    if(days<=3) ageBuckets.fresh++;
    else if(days<=7) ageBuckets.mid++;
    else ageBuckets.stale++;
  });

  const byCampaign = campaigns.map(c=>{
    const own = delivered.filter(o=>o.campaignId===c.id);
    const ownPosted = own.filter(o=>postedOf(o));
    return {
      campaign: c,
      deliveredCount: own.length,
      postedCount: ownPosted.length,
      waitingCount: own.length - ownPosted.length,
      pct: own.length ? Math.round(ownPosted.length/own.length*100) : null,
    };
  }).filter(x=>x.deliveredCount>0).sort((a,b)=>(a.pct==null?-1:a.pct)-(b.pct==null?-1:b.pct));

  return {deliveredCount: delivered.length, postedCount: posted.length, waitingCount, pct,
    withLink, withoutLink, avgLagDays, ageBuckets, byCampaign};
}
/* ---------- ROMI крупных инфлюенс-интеграций (кривая затухания) ----------
   Логика (как договорились с заказчиком):
   1) база дня = среднее по «чистым» дням (без эффекта чьей-либо интеграции) по этому товару;
   2) вклад интеграции в конкретный день живёт только 3 дня (100% / 50% / 20%), дальше — 0;
   3) если в один день активны несколько интеграций по одному товару — прирост дня
      (продажи минус база) делится между ними пропорционально их весам в этот день,
      а не достаётся целиком той, что публиковалась позже;
   4) чистый вклад интеграции = сумма её долей по всем дням;
   5) ROMI = чистый вклад / расход.
   Если по товару вообще нет ни одного «чистого» дня в загруженной истории продаж —
   считать не из чего, ROMI для таких интеграций помечается как «недостаточно данных»
   (пока не догрузят историю задним числом — так и решили с заказчиком). */
// Дата интеграции для фильтров/сравнения периодов: факт-дата публикации, а если её ещё нет — план-дата.
function inflDealDate(d){ return d.publishedDate || d.plannedDate || ""; }
function inflAvailableMonths(){
  const {influencerDeals} = DataManager.state;
  const set = new Set();
  influencerDeals.forEach(d=>{ const dt = inflDealDate(d); if(dt) set.add(dt.slice(0,7)); });
  return [...set].sort();
}
function monthLabel(ym){
  const names = ["","Январь","Февраль","Март","Апрель","Май","Июнь","Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"];
  const [y,m] = ym.split("-");

// Метрики за произвольный период для дашборда сравнения: считаем по уже готовым строкам ROMI
// (r.netContribution/r.romi не пересчитываются заново — они не зависят от выбранного периода
// сравнения, т.к. движок ROMI считает decay-окно от абсолютной даты публикации).
function periodStats(rows, from, to){

function deltaCell(av, bv){

  if(av===0) return bv===0 ? `<span style="color:var(--ink-mute)">—</span>` : `<span style="color:var(--ok)">+∞</span>`;

function daysBetween(a,b){ return Math.round((new Date(a).getTime()-new Date(b).getTime())/86400000); }
function decayWeight(daysSincePost){
  if(daysSincePost===0) return 1;
  if(daysSincePost===1) return 0.5;
  if(daysSincePost===2) return 0.2;
  return 0;
}
// Ключ сопоставления интеграции/продажи: если у обеих сторон указан ШК товара — сверяем по ШК
// (надёжно, не зависит от того, как называется товар в 1С/Каспи или в карточке интеграции).
// Если ШК не указан — сверяем по текстовому названию продукта, как раньше (для старых записей).
function dealMatchKey(d){ return (d.barcode||"").trim() || d.product; }
function saleMatchKey(s){ return (s.barcode||"").trim() || s.product; }
// ВАЖНО: крупные и микро/средние интеграции считаются здесь ВМЕСТЕ, одним расчётом,
// а не двумя независимыми (как было раньше). Причина: если по одному и тому же товару
// в одно и то же время шла реклама и у крупного блогера, и у микро/среднего — то (а) "чистые"
// дни без рекламы для базовой линии должны быть чистыми от ОБОИХ каналов сразу, иначе базовая
// линия одного канала будет завышена из-за скрытой активности другого; и (б) прирост продаж в
// такие дни нужно делить МЕЖДУ всеми активными интеграциями обоих каналов (по тому же
// decay-весу), а не засчитывать полностью и туда, и туда — иначе один и тот же прирост
// задвоится в сумме "Вклад в продажи" крупных + микро дашбордов.
function computeUnifiedInfluencerRomi(){
  const {influencerDeals, microInfluencerDeals, salesByDay} = DataManager.state;
  const units = [
    ...influencerDeals.map(d=>({key:'large:'+d.id, type:'large', matchKey:dealMatchKey(d), date:d.publishedDate, cost:d.cost||0, deal:d})),
    // cost для микро/средних — оплата + себестоимость товара (microDealTotalCost), см. её комментарий:
    // бартерная выдача товара — тоже реальный расход, поэтому ROMI микро-интеграций считается по сумме.
    ...microInfluencerDeals.map(d=>({key:'micro:'+d.id, type:'micro', matchKey:microDealMatchKey(d), date:d.publishDate, cost:microDealTotalCost(d), deal:d})),
  ];

  const byProduct = {};
  salesByDay.forEach(s=>{ const key = saleMatchKey(s); (byProduct[key] = byProduct[key] || []).push(s); });

  function isCleanDay(matchKey, dateStr){
    return !units.some(u=>{
      if(u.matchKey!==matchKey || !u.date) return false;
      const diff = daysBetween(dateStr, u.date);
      return diff>=0 && diff<=2;
    });
  }
  const baselineByProduct = {};
  Object.keys(byProduct).forEach(matchKey=>{
    const clean = byProduct[matchKey].filter(s=>isCleanDay(matchKey, s.date));
    baselineByProduct[matchKey] = clean.length ? clean.reduce((a,s)=>a+s.revenue,0)/clean.length : null;
  });

  const contribution = {};
  units.forEach(u=> contribution[u.key]=0);

  Object.keys(byProduct).forEach(matchKey=>{
    const base = baselineByProduct[matchKey];
    if(base==null) return;
    byProduct[matchKey].forEach(s=>{
      const uplift = Math.max(0, s.revenue - base);
      if(uplift<=0) return;
      const active = units
        .filter(u=>u.matchKey===matchKey && u.date)
        .map(u=>({u, diff: daysBetween(s.date, u.date)}))
        .filter(x=>x.diff>=0 && x.diff<=2)
        .map(x=>({u:x.u, w: decayWeight(x.diff)}));
      const totalW = active.reduce((a,x)=>a+x.w,0);
      if(totalW<=0) return;
      active.forEach(x=>{ contribution[x.u.key] += uplift * (x.w/totalW); });
    });
  });

  return {units, contribution, baselineByProduct};
}
function computeInfluencerRomi(){
  const {units, contribution, baselineByProduct} = computeUnifiedInfluencerRomi();
  return units.filter(u=>u.type==='large').map(u=>{
    const netContribution = Math.round(contribution[u.key]||0);
    const hasBaseline = baselineByProduct[u.matchKey]!=null;
    const romi = (hasBaseline && u.cost>0) ? (netContribution / u.cost) : null;
    return {deal:u.deal, netContribution, romi, hasBaseline};
  });
}
// from/to — тот же необязательный фильтр периода, что и в marketingSummary; фильтрует по
// дате интеграции (inflDealDate: факт публикации, а если его нет — план).
function influencerSummary(from, to){
  let rows = computeInfluencerRomi();
  if(from || to) rows = rows.filter(r=>inDateRange(inflDealDate(r.deal), from, to));
  const totalCost = rows.reduce((s,r)=>s+(r.deal.cost||0),0);
  const plannedCost = rows.reduce((s,r)=>s+(r.deal.plannedCost||0),0);
  const totalReach = rows.reduce((s,r)=>s+(r.deal.reach||0),0);
  const totalClicks = rows.reduce((s,r)=>s+(r.deal.clicks||0),0);
  const plannedReach = rows.reduce((s,r)=>s+(r.deal.plannedReach||0),0);
  const plannedClicks = rows.reduce((s,r)=>s+(r.deal.plannedClicks||0),0);
  // "Продажи факт" — сумма вклада всех интеграций (0, если по товару ещё нет базы для ROMI).
  const totalSalesContribution = rows.reduce((s,r)=>s+(r.netContribution||0),0);
  // Постов запланировано — все интеграции; факт — те, у кого проставлена дата публикации.
  const plannedPosts = rows.length;
  const actualPosts = rows.filter(r=>r.deal.publishedDate).length;
  const withRomi = rows.filter(r=>r.romi!=null);
  const avgRomi = withRomi.length ? withRomi.reduce((a,r)=>a+r.romi,0)/withRomi.length : null;
  const top = withRomi.slice().sort((a,b)=>b.romi-a.romi)[0] || null;
  return {rows, totalCost, plannedCost, totalReach, totalClicks, plannedReach, plannedClicks,
    totalSalesContribution, plannedPosts, actualPosts, avgRomi, top, count: rows.length};
}
// Агрегация по блогеру для рейтингов «Топ блогеров» среди платных инфлюенс-интеграций
// (используется только база influencerDeals — крупные платные интеграции, не бартерные рассылки).
// ---------- Инфлюенс интеграции микро/средние (отв. Нина) ----------
// Для каждой интеграции считаем факт.охват (Reels+TikTok) и CPV = сумма/факт.охват — это
// работает всегда, даже без ШК. Отдельно, если у интеграции указан ШК (или совпадает
// название товара) — тем же decay-движком, что и для крупных инфлюенсеров, считаем вклад
// в продажи и ROMI (computeMicroInfluencerRomi). from/to — необязательный фильтр периода
// по дате выкладки (тот же паттерн, что и в marketingSummary/influencerSummary).
function microDealFactReach(d){ return (d.factReachReels||0) + (d.factReachTT||0); }
// Таблица показывает и редактирует ОДНУ общую ячейку "Факт.охват" (Reels+TikTok вместе), но
// хранятся они как два отдельных поля (factReachReels/factReachTT — второе не выведено отдельной
// колонкой). Чтобы клик по общей ячейке сохранял именно то число, что ввёл маркетолог, TikTok-часть
// оставляем как есть и весь новый итог относим на factReachReels: reels = новый_итог − текущий TT.
function microDealFactReachPatch(d, newTotal){
  const tt = d.factReachTT || 0;
  return { factReachReels: Math.max(0, (newTotal||0) - tt) };
}
function microDealAvgReach(d){ return (d.avgReach||0) + (d.avgReachTT||0); }
// Полная стоимость интеграции для расходов/CPV/ROMI — оплата блогеру (cost) + себестоимость
// товара, отданного бартером (productCost). Раньше в расходы шла только оплата, но выдача
// товара — тоже реальные деньги компании, поэтому считаем расход как сумму обоих полей.
// Само поле "Сумма" в таблице/модалке при этом остаётся именно оплатой (отдельная колонка
// "Стоимость товара" — отдельный ввод), просто итоги/CPV/ROMI считаются уже по сумме.
function microDealTotalCost(d){ return (d.cost||0) + (d.productCost||0); }
function microDealCpv(d){
  const reach = microDealFactReach(d);
  const cost = microDealTotalCost(d);
  return (cost>0 && reach>0) ? cost/reach : null;
}
// Дата интеграции для фильтров/сравнения периодов у микро/средних — просто дата выкладки
// (в отличие от крупных, тут нет отдельной план-даты).
function microDealDate(d){ return d.publishDate || ""; }
function microDealMatchKey(d){ return (d.barcode||"").trim() || d.product; }
// Тот же decay-движок ROMI, что и computeInfluencerRomi, и считается ОДНИМ общим расчётом
// вместе с крупными интеграциями (см. комментарий у computeUnifiedInfluencerRomi выше) — так
// реклама у крупного блогера в те же даты не задваивает и не искажает вклад микро/средних.
function computeMicroInfluencerRomi(){
  const {units, contribution, baselineByProduct} = computeUnifiedInfluencerRomi();
  return units.filter(u=>u.type==='micro').map(u=>{
    const netContribution = Math.round(contribution[u.key]||0);
    const hasBaseline = baselineByProduct[u.matchKey]!=null;
    const romi = (hasBaseline && u.cost>0) ? (netContribution / u.cost) : null;
    return {deal:u.deal, netContribution, romi, hasBaseline};
  });
}
function microInfluencerSummary(from, to){
  let deals = DataManager.state.microInfluencerDeals;
  if(from || to) deals = deals.filter(d=>inDateRange(d.publishDate, from, to));
  // totalCost = оплата блогерам + себестоимость подаренного товара (см. microDealTotalCost).
  const totalCost = deals.reduce((s,d)=>s+microDealTotalCost(d),0);
  const totalFactReach = deals.reduce((s,d)=>s+microDealFactReach(d),0);
  const totalAvgReach = deals.reduce((s,d)=>s+microDealAvgReach(d),0);
  const paidCount = deals.filter(d=>d.paymentStatus==="оплачено").length;
  const unpaidCount = deals.filter(d=>d.paymentStatus==="не оплачено").length;
  const toPayCount = deals.filter(d=>d.paymentStatus==="к оплате").length;
  const publishedCount = deals.filter(d=>d.videoStatus==="опубликовано").length;
  // Ещё запланировано — интеграции, по которым пока вообще ничего не сделано (ни оплаты, ни публикации).
  // Отдельно от paidCount/publishedCount, потому что те просто разбивают по одному статусу, а тут — обе
  // стадии сразу, то есть по сути "план", который ещё только предстоит выполнить.
  const pendingCount = deals.filter(d=>d.paymentStatus==="не оплачено" && d.videoStatus!=="опубликовано").length;
  // Уникальных блогеров — не то же самое, что кол-во интеграций: один блогер может продавать
  // пакетом несколько постов/товаров (3-4 интеграции сразу), поэтому считаем отдельно по имени.
  const uniqueBloggerCount = new Set(deals.map(d=>d.blogerName||"—")).size;
  const avgCpv = (totalCost>0 && totalFactReach>0) ? totalCost/totalFactReach : null;

  let romiRows = computeMicroInfluencerRomi();
  if(from || to) romiRows = romiRows.filter(r=>inDateRange(microDealDate(r.deal), from, to));
  const totalSalesContribution = romiRows.reduce((s,r)=>s+(r.netContribution||0),0);
  const withRomi = romiRows.filter(r=>r.romi!=null);
  const avgRomi = withRomi.length ? withRomi.reduce((a,r)=>a+r.romi,0)/withRomi.length : null;
  const topRomi = withRomi.slice().sort((a,b)=>b.romi-a.romi)[0] || null;

  return {deals, totalCost, totalFactReach, totalAvgReach, paidCount, unpaidCount, toPayCount, publishedCount, pendingCount, uniqueBloggerCount, avgCpv, count: deals.length,
    romiRows, totalSalesContribution, avgRomi, topRomi};
}
function influencerBloggerAgg(rows){
  const map = {};
  rows.forEach(r=>{
    const login = r.deal.blogerLogin || "—";
    if(!map[login]) map[login] = {login, reach:0, clicks:0, contribution:0, cost:0, dealsCount:0};
    const a = map[login];
    a.reach += r.deal.reach||0;
    a.clicks += r.deal.clicks||0;
    a.contribution += r.netContribution||0;
    a.cost += r.deal.cost||0;
    a.dealsCount++;
  });
  return Object.values(map);
}

/* ---------- Стилизованный дашборд "Платный инфлюенс" (по референсу заказчика) ----------
   Показывается наверху вкладки "Инфлюенс интеграции крупные". КПИ/лучший-худший/план-факт/
   тренд считаются по интеграциям ВЫБРАННОГО месяца; воронка стадий — по всем интеграциям
   без привязки к месяцу (это состояние текущего пайплайна "здесь и сейчас", а не месячная метрика,
   иначе интеграции без даты публикации/плана никогда бы в неё не попадали). */
function influencerReachTrend(allRows){
  return inflAvailableMonths().map(m=>{
    const rows = allRows.filter(r=>inflDealDate(r.deal).slice(0,7)===m);
    const avgReach = rows.length ? Math.round(rows.reduce((s,r)=>s+(r.deal.reach||0),0)/rows.length) : 0;
    return {month:m, avgReach};
  });
}
function influencerFunnelCounts(allRows){
  const counts = {};
  DEAL_STATUSES.forEach(st=>counts[st]=0);
  allRows.forEach(r=>{ const st=r.deal.status; counts[st] = (counts[st]||0)+1; });
  return DEAL_STATUSES.map(st=>({status:st, count:counts[st]||0}));
}
function influencerBrandStats(monthRows){
  const withBaseline = monthRows.filter(r=>r.hasBaseline);
  const totalCost = monthRows.reduce((s,r)=>s+(r.deal.cost||0),0);
  const plannedCost = monthRows.reduce((s,r)=>s+(r.deal.plannedCost||0),0);
  const totalReach = monthRows.reduce((s,r)=>s+(r.deal.reach||0),0);
  const plannedReach = monthRows.reduce((s,r)=>s+(r.deal.plannedReach||0),0);
  const totalClicks = monthRows.reduce((s,r)=>s+(r.deal.clicks||0),0);
  const plannedClicks = monthRows.reduce((s,r)=>s+(r.deal.plannedClicks||0),0);
  const totalContribution = monthRows.reduce((s,r)=>s+(r.netContribution||0),0);
  const dealsCount = monthRows.length;
  const publishedCount = monthRows.filter(r=>r.deal.publishedDate).length;

  const romi = totalCost>0 ? totalContribution/totalCost : null;
  const roasPct = totalCost>0 ? totalContribution/totalCost*100 : null;
  const drrPct = totalContribution>0 ? totalCost/totalContribution*100 : null;
  const cpv = totalReach>0 ? totalCost/totalReach : null;
  const upliftPerView = totalReach>0 ? totalContribution/totalReach : null;
  const upliftPerDeal = withBaseline.length
    ? withBaseline.reduce((s,r)=>s+(r.netContribution-(r.deal.cost||0)),0)/withBaseline.length
    : null;

  // Лучший/худший блогер и лучшая/худшая интеграция — только среди тех, у кого вообще посчитан
  // ROMI (hasBaseline), иначе "нет данных" (contribution=0) выглядело бы как чистый убыток.
  const bloggerAgg = influencerBloggerAgg(withBaseline)
    .filter(a=>a.cost>0)
    .map(a=>({...a, profit: a.contribution-a.cost, romi: a.contribution/a.cost}));
  const bestBlogger = bloggerAgg.slice().sort((a,b)=>b.profit-a.profit)[0] || null;
  const worstBlogger = bloggerAgg.length>1 ? bloggerAgg.slice().sort((a,b)=>a.profit-b.profit)[0] : null;

  const dealProfit = withBaseline.filter(r=>(r.deal.cost||0)>0).map(r=>({r, profit:r.netContribution-r.deal.cost}));
  const bestDeal = dealProfit.slice().sort((a,b)=>b.profit-a.profit)[0] || null;
  const worstDeal = dealProfit.length>1 ? dealProfit.slice().sort((a,b)=>a.profit-b.profit)[0] : null;

  return {totalCost, plannedCost, totalReach, plannedReach, totalClicks, plannedClicks,
    totalContribution, dealsCount, publishedCount, romi, roasPct, drrPct, cpv, upliftPerView, upliftPerDeal,
    bloggerAgg, bestBlogger, worstBlogger, bestDeal, worstDeal};
}

        const h = Math.round(t.avgReach/maxTrend*140)+6;
        const active = t.month===month;
        return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%">
          <div style="font-size:11px;color:var(--ink-mute);margin-bottom:4px">${fmtNum(t.avgReach)}</div>
          <div style="width:100%;max-width:46px;height:${h}px;border-radius:6px 6px 0 0;background:${active?INFL_BRAND:INFL_BRAND_LIGHT};border:1px solid ${INFL_BRAND}"></div>
          <div style="font-size:11px;color:var(--ink-mute);margin-top:6px">${escapeHtml(tabLabel(t.month))}</div>
        </div>`;
      }).join("")}
    </div>`;

  const maxFunnel = Math.max(1, ...funnel.map(f=>f.count));
  const funnelChart = funnel.map(f=>`
    <div style="margin-bottom:10px">
      <div style="font-size:12.8px;margin-bottom:4px"><b>${escapeHtml(f.status)}</b></div>
      <div style="background:${INFL_BRAND_LIGHT};border-radius:8px;height:26px">
        <div style="height:100%;border-radius:8px;background:${INFL_BRAND};width:${Math.max(f.count?10:0,Math.round(f.count/maxFunnel*100))}%;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;min-width:${f.count?'28px':'0'}">
          ${f.count ? `<b style="color:#fff;font-size:12px">${f.count}</b>` : ""}
        </div>
      </div>
    </div>`).join("");

  const bcgBubbles = s.bloggerAgg;
  const bcg = bcgBubbles.length>=2 ? (()=>{
    const W=560,H=260,pad=42;
    const maxRomi = Math.max(0.1, ...bcgBubbles.map(a=>a.romi));
    const maxReach = Math.max(1, ...bcgBubbles.map(a=>a.reach));
    const maxCost = Math.max(1, ...bcgBubbles.map(a=>a.cost));
    const pts = bcgBubbles.map(a=>{
      const x = pad + (a.romi/maxRomi)*(W-2*pad);
      const y = H-pad - (a.reach/maxReach)*(H-2*pad);
      const r = 6 + Math.sqrt(a.cost/maxCost)*22;
      return {x,y,r,login:a.login};
    });
    return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;max-height:220px">
      <line x1="${pad}" y1="${H-pad}" x2="${W-pad}" y2="${H-pad}" stroke="var(--line-2)"/>
      <line x1="${pad}" y1="${pad}" x2="${pad}" y2="${H-pad}" stroke="var(--line-2)"/>
      <text x="${W-pad}" y="${H-pad+16}" font-size="10" fill="var(--ink-mute)" text-anchor="end">ROMI →</text>
      <text x="${pad-6}" y="${pad+2}" font-size="10" fill="var(--ink-mute)" text-anchor="end">Охват</text>
      ${pts.map(p=>`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="${p.r.toFixed(1)}" fill="${INFL_BRAND}" fill-opacity="0.55" stroke="${INFL_BRAND}"/>
      <text x="${p.x.toFixed(1)}" y="${(p.y-p.r-4).toFixed(1)}" font-size="10" fill="var(--ink)" text-anchor="middle">${escapeHtml(p.login)}</text>`).join("")}
    </svg>`;
  })() : `<div class="login-hint">Нужно минимум 2 блогера с посчитанным ROMI за этот месяц</div>`;

  return `
  <div class="panel">
    <div class="panel-title">
      Платный инфлюенс · дашборд
      <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
        ${recentMonths.map(m=>`<button class="btn btn-sm infl-dash-month-tab" data-month="${m}" style="background:${m===month?INFL_BRAND:INFL_BRAND_LIGHT};color:${m===month?'#fff':INFL_BRAND}">${escapeHtml(tabLabel(m))}</button>`).join("")}
        ${hasMoreMonths ? `<select id="infl-dash-month-select" style="border:1px solid ${INFL_BRAND};border-radius:8px;padding:6px 8px;color:${INFL_BRAND};font-weight:600;font-size:12px;background:#fff">
          <option value="">Ещё месяцы…</option>
          ${months.map(m=>`<option value="${m}" ${m===month?'selected':''}>${escapeHtml(monthLabel(m))}</option>`).join("")}
        </select>` : ""}
      </div>
    </div>

    <div class="grid-kpi">
      ${kpi("Расходы", fmtNum(s.totalCost)+" ₸")}
      ${kpi("План затрат на конец месяца", fmtNum(s.plannedCost)+" ₸")}
      ${kpi("Выручка (вклад)", fmtNum(Math.round(s.totalContribution))+" ₸")}
      ${kpi("ROMI", s.romi==null?"—":"×"+s.romi.toFixed(2))}
      ${kpi("ROAS", s.roasPct==null?"—":Math.round(s.roasPct)+"%")}
      ${kpi("ДРР", s.drrPct==null?"—":s.drrPct.toFixed(1)+"%")}
      ${kpi("CPV", s.cpv==null?"—":(Math.round(s.cpv*100)/100)+" ₸")}
      ${kpi("Охват", fmtNum(s.totalReach))}
      ${kpi("Прирост ₸/просмотр", s.upliftPerView==null?"—":(Math.round(s.upliftPerView*100)/100)+" ₸")}
      ${kpi("Прирост ₸/интеграцию", s.upliftPerDeal==null?"—":fmtNum(Math.round(s.upliftPerDeal))+" ₸")}
    </div>

    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px;margin-bottom:14px">
      ${card("Лучший блогер", "var(--ok)", "var(--ok-bg)", s.bestBlogger ? `
        <div style="font-weight:700;margin:4px 0">${escapeHtml(s.bestBlogger.login)}</div>
        <div style="color:var(--ok);font-weight:700">${fmtSigned(s.bestBlogger.profit)} прироста</div>
        <div style="color:var(--ink-mute);font-size:11.5px">ROMI ×${s.bestBlogger.romi.toFixed(2)} · охват ${fmtNum(s.bestBlogger.reach)}</div>`
        : `<div class="login-hint" style="margin-top:6px">Нет данных за месяц</div>`)}
      ${card("Худший блогер", "var(--bad)", "var(--bad-bg)", s.worstBlogger ? `
        <div style="font-weight:700;margin:4px 0">${escapeHtml(s.worstBlogger.login)}</div>
        <div style="color:${s.worstBlogger.profit<0?'var(--bad)':'var(--ok)'};font-weight:700">${fmtSigned(s.worstBlogger.profit)}${s.worstBlogger.profit<0?" (убыток)":""}</div>
        <div style="color:var(--ink-mute);font-size:11.5px">ROMI ×${s.worstBlogger.romi.toFixed(2)} · охват ${fmtNum(s.worstBlogger.reach)}</div>`
        : `<div class="login-hint" style="margin-top:6px">Нужно ≥2 блогера с ROMI</div>`)}
      ${card("Лучшая интеграция", "var(--ok)", "var(--ok-bg)", s.bestDeal ? `
        <div style="font-weight:700;margin:4px 0">${escapeHtml(s.bestDeal.r.deal.platform)} «${escapeHtml(s.bestDeal.r.deal.product)}»</div>
        <div style="color:var(--ok);font-weight:700">${fmtSigned(s.bestDeal.profit)}</div>
        <div style="color:var(--ink-mute);font-size:11.5px">${escapeHtml(s.bestDeal.r.deal.blogerLogin)} · ${escapeHtml(s.bestDeal.r.deal.publishedDate||"—")} · охват ${fmtNum(s.bestDeal.r.deal.reach)}</div>`
        : `<div class="login-hint" style="margin-top:6px">Нет данных за месяц</div>`)}
      ${card("Худшая интеграция", "var(--bad)", "var(--bad-bg)", s.worstDeal ? `
        <div style="font-weight:700;margin:4px 0">${escapeHtml(s.worstDeal.r.deal.platform)} «${escapeHtml(s.worstDeal.r.deal.product)}»</div>
        <div style="color:${s.worstDeal.profit<0?'var(--bad)':'var(--ok)'};font-weight:700">${fmtSigned(s.worstDeal.profit)}</div>
        <div style="color:var(--ink-mute);font-size:11.5px">${escapeHtml(s.worstDeal.r.deal.blogerLogin)} · ${escapeHtml(s.worstDeal.r.deal.publishedDate||"—")} · охват ${fmtNum(s.worstDeal.r.deal.reach)}</div>`
        : `<div class="login-hint" style="margin-top:6px">Нужно ≥2 интеграции с ROMI</div>`)}
    </div>

    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:14px;margin-bottom:14px">
      <div>
        <div style="font-weight:700;font-size:13px;margin-bottom:8px">План/факт · ${escapeHtml(monthLabel(month))}</div>
        ${planFactRow("Охват", s.totalReach, s.plannedReach)}
        ${planFactRow("Клики", s.totalClicks, s.plannedClicks)}
        ${planFactRow("Расход, ₸", s.totalCost, s.plannedCost)}
        ${planFactRow("Интеграций опубликовано", s.publishedCount, s.dealsCount)}
      </div>
      <div>
        <div style="font-weight:700;font-size:13px;margin-bottom:8px">Средний охват интеграции по месяцам</div>
        ${trendChart}
      </div>
    </div>

    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:14px">
      <div>
        <div style="font-weight:700;font-size:13px;margin-bottom:8px">БКГ-матрица · платные блогеры
          <span style="font-weight:400;color:var(--ink-mute);font-size:11px">X — ROMI, Y — охват, размер — расход</span>
        </div>
        ${bcg}
      </div>
      <div>
        <div style="font-weight:700;font-size:13px;margin-bottom:8px">Стадии интеграций
          <span style="font-weight:400;color:var(--ink-mute);font-size:11px">по всем интеграциям, без привязки к месяцу</span>
        </div>
        ${funnelChart}
      </div>
    </div>
  </div>
  `;
}

/* ---------- Стилизованный дашборд "Платный инфлюенс" — версия для микро/средних (отв. Нина) ----------
   Та же структура и стиль, что и tplInfluencerBrandDashboard (месяцы-вкладки, КПИ, лучший/худший
   блогер и интеграция, тренд охвата, БКГ-матрица), только источник — computeMicroInfluencerRomi(),
   а вместо воронки по единому статусу сделки (у микро/средних нет одного общего статуса) — воронка
   по статусу оплаты. Плана (план-охват/план-расход) в этой модели нет, поэтому вместо блока
   "План/факт" показываем разбивку по статусам оплаты/публикации. */
function microBloggerAgg(rows){
  const map = {};
  rows.forEach(r=>{
    const login = r.deal.blogerName || "—";
    if(!map[login]) map[login] = {login, reach:0, contribution:0, cost:0, dealsCount:0};
    const a = map[login];
    a.reach += microDealFactReach(r.deal);
    a.contribution += r.netContribution||0;
    a.cost += r.deal.cost||0;
    a.dealsCount++;
  });
  return Object.values(map);
}
function microAvailableMonths(){
  // В исходной таблице у части строк "Дата выкладки" — это текстовый диапазон вроде "14-15 июля"
  // (не одна дата), а не ISO-дата. Такие значения не парсятся как месяц — пропускаем их здесь,
  // чтобы не заводить фиктивные вкладки-месяцы; сама дата всё равно видна в таблице интеграций.
  const {microInfluencerDeals} = DataManager.state;
  const set = new Set();
  microInfluencerDeals.forEach(d=>{
    const dt = microDealDate(d);
    if(dt && /^\d{4}-\d{2}-\d{2}$/.test(dt)) set.add(dt.slice(0,7));
  });
  return [...set].sort();
}
function microReachTrend(allRows){
  return microAvailableMonths().map(m=>{
    const rows = allRows.filter(r=>microDealDate(r.deal).slice(0,7)===m);
    const avgReach = rows.length ? Math.round(rows.reduce((s,r)=>s+microDealFactReach(r.deal),0)/rows.length) : 0;
    return {month:m, avgReach};
  });
}
function microFunnelCounts(allRows){
  const counts = {};
  MICRO_PAYMENT_STATUSES.forEach(st=>counts[st]=0);
  allRows.forEach(r=>{ const st=r.deal.paymentStatus; if(st) counts[st] = (counts[st]||0)+1; });
  return MICRO_PAYMENT_STATUSES.map(st=>({status:st, count:counts[st]||0}));
}
function microInfluencerBrandStats(monthRows){
  const withBaseline = monthRows.filter(r=>r.hasBaseline);
  const totalCost = monthRows.reduce((s,r)=>s+(r.deal.cost||0),0);
  const totalReach = monthRows.reduce((s,r)=>s+microDealFactReach(r.deal),0);
  const totalContribution = monthRows.reduce((s,r)=>s+(r.netContribution||0),0);
  const dealsCount = monthRows.length;
  const publishedCount = monthRows.filter(r=>r.deal.videoStatus==="опубликовано").length;
  const paidCount = monthRows.filter(r=>r.deal.paymentStatus==="оплачено").length;

  const romi = totalCost>0 ? totalContribution/totalCost : null;
  const roasPct = totalCost>0 ? totalContribution/totalCost*100 : null;
  const drrPct = totalContribution>0 ? totalCost/totalContribution*100 : null;
  const cpv = totalReach>0 ? totalCost/totalReach : null;
  const upliftPerView = totalReach>0 ? totalContribution/totalReach : null;
  const upliftPerDeal = withBaseline.length
    ? withBaseline.reduce((s,r)=>s+(r.netContribution-(r.deal.cost||0)),0)/withBaseline.length
    : null;

  const bloggerAgg = microBloggerAgg(withBaseline)
    .filter(a=>a.cost>0)
    .map(a=>({...a, profit: a.contribution-a.cost, romi: a.contribution/a.cost}));
  const bestBlogger = bloggerAgg.slice().sort((a,b)=>b.profit-a.profit)[0] || null;
  const worstBlogger = bloggerAgg.length>1 ? bloggerAgg.slice().sort((a,b)=>a.profit-b.profit)[0] : null;

  const dealProfit = withBaseline.filter(r=>(r.deal.cost||0)>0).map(r=>({r, profit:r.netContribution-r.deal.cost}));
  const bestDeal = dealProfit.slice().sort((a,b)=>b.profit-a.profit)[0] || null;
  const worstDeal = dealProfit.length>1 ? dealProfit.slice().sort((a,b)=>a.profit-b.profit)[0] : null;

  return {totalCost, totalReach, totalContribution, dealsCount, publishedCount, paidCount, romi, roasPct, drrPct, cpv, upliftPerView, upliftPerDeal,
    bloggerAgg, bestBlogger, worstBlogger, bestDeal, worstDeal};
}
// Человекочитаемое объяснение конкретной цифры "Выручка (вклад)" за месяц — по просьбе Нины:
// не просто формула, а разбивка — сколько интеграций с ШК учтено, из них скольким реально
// посчитан вклад (есть история продаж/база), было ли в те же даты пересечение с крупными
// блогерами (и как тогда делился прирост, чтобы не задваивался — см. computeUnifiedInfluencerRomi),
// и за какой период считается база (вся история продаж, а не только выбранный месяц).
function microContributionExplain(monthRows, month){
  const withShk = monthRows.filter(r=>(r.deal.barcode||"").trim());
  const withBaseline = withShk.filter(r=>r.hasBaseline);
  const {influencerDeals} = DataManager.state;
  let overlapCount = 0;
  withBaseline.forEach(r=>{
    const matchKey = microDealMatchKey(r.deal);
    const overlaps = influencerDeals.some(ld=>{
      if(dealMatchKey(ld)!==matchKey || !ld.publishedDate || !r.deal.publishDate) return false;
      return Math.abs(daysBetween(r.deal.publishDate, ld.publishedDate))<=2;
    });
    if(overlaps) overlapCount++;
  });
  const total = Math.round(withBaseline.reduce((s,r)=>s+(r.netContribution||0),0));
  const lines = [
    `Показатель за: ${monthLabel(month)}.`,
    `Интеграций с ШК за месяц: ${withShk.length}; из них с историей продаж по товару (посчитан вклад): ${withBaseline.length}.`,
    `База — средняя выручка по товару в "чистые" дни (без рекламы любого типа по этому товару). Считается по всей истории продаж в 1С, а не только за этот месяц.`,
    overlapCount>0
      ? `У ${overlapCount} из них в те же 0-2 дня выходила реклама и у крупных блогеров — прирост продаж в такие дни поделён между каналами пропорционально весам (1.0 в день поста, 0.5 на следующий день, 0.2 на третий), а не задвоен.`
      : `Пересечений по датам с интеграциями крупных блогеров в этом месяце не найдено.`,
    `Итоговая сумма: ${fmtNum(total)} ₸.`
  ];
  return lines.join("\n");
}
function tplMicroInfluencerBrandDashboard(allRows){
  const months = microAvailableMonths();
  if(!months.length){
    return `<div class="panel">
      <div class="panel-title">Микро/средние · дашборд</div>
      <div class="login-hint">Добавьте интеграции с датой выкладки, чтобы увидеть сводку по месяцам.</div>
    </div>`;
  }
  const month = (UI.microDashMonth && months.includes(UI.microDashMonth)) ? UI.microDashMonth : months[months.length-1];
  const monthRows = allRows.filter(r=>microDealDate(r.deal).slice(0,7)===month);
  const s = microInfluencerBrandStats(monthRows);
  const trend = microReachTrend(allRows);
  const funnel = microFunnelCounts(allRows);

  const MAX_MONTH_TABS = 6;
  const recentMonths = Array.from(new Set([...months.slice(-MAX_MONTH_TABS), month])).sort();
  const hasMoreMonths = months.length > recentMonths.length;
  const multiYear = new Set(months.map(m=>m.slice(0,4))).size > 1;
  const tabLabel = (m) => {
    const short = monthLabel(m).split(" ")[0].slice(0,3);
    return multiYear ? `${short} '${m.slice(2,4)}` : short;
  };

  const qMark = (formula) => `<span title="${escapeHtml(formula)}" style="display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:50%;background:var(--line-2);color:var(--ink-mute);font-size:10px;font-weight:700;cursor:help;vertical-align:middle;margin-left:4px">?</span>`;
  // detail — необязательная развёрнутая расшифровка именно для тултипа (значок "?"), когда короткой
  // формулы недостаточно (см. "Выручка (вклад)" ниже — microContributionExplain). Короткая подпись
  // под цифрой всегда показывает formula, а не detail — так под каждой цифрой не разрастается текст.
  const kpi = (label, value, formula, detail) => `<div class="kpi"><div class="num" style="color:${MICRO_BRAND}">${value}</div><div class="lbl">${label}${formula?qMark(detail||formula):""}</div>${formula?`<div style="font-size:10px;color:var(--ink-mute);margin-top:3px;line-height:1.35">${formula}</div>`:""}</div>`;
  const fmtSigned = (v) => (v>=0?"+":"−") + fmtNum(Math.abs(Math.round(v))) + " ₸";

  const card = (title, borderColor, bg, body) => `
    <div style="border-left:3px solid ${borderColor};background:${bg};border-radius:8px;padding:12px">
      <div style="font-size:11px;font-weight:700;color:${borderColor};text-transform:uppercase">${title}</div>
      ${body}
    </div>`;

  const statusRow = (label, count, total) => {
    const pct = total>0 ? Math.round(count/total*100) : 0;
    return `<div style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;font-size:12.8px;margin-bottom:4px">
        <b>${label}</b>
        <span>${fmtNum(count)} / <b>${fmtNum(total)}</b> <b style="color:var(--ok)">${pct}%</b></span>
      </div>
      <div class="pbar" style="background:${MICRO_BRAND_LIGHT}"><span style="width:${Math.min(100,pct)}%;background:${MICRO_BRAND}"></span></div>
    </div>`;
  };

  const maxTrend = Math.max(1, ...trend.map(t=>t.avgReach));
  const trendChart = `
    <div style="display:flex;align-items:flex-end;gap:10px;height:180px;padding-top:10px">
      ${trend.map(t=>{
        const h = Math.round(t.avgReach/maxTrend*140)+6;
        const active = t.month===month;
        return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%">
          <div style="font-size:11px;color:var(--ink-mute);margin-bottom:4px">${fmtNum(t.avgReach)}</div>
          <div style="width:100%;max-width:46px;height:${h}px;border-radius:6px 6px 0 0;background:${active?MICRO_BRAND:MICRO_BRAND_LIGHT};border:1px solid ${MICRO_BRAND}"></div>
          <div style="font-size:11px;color:var(--ink-mute);margin-top:6px">${escapeHtml(tabLabel(t.month))}</div>
        </div>`;
      }).join("")}
    </div>`;

  const maxFunnel = Math.max(1, ...funnel.map(f=>f.count));
  const funnelChart = funnel.map(f=>`
    <div style="margin-bottom:10px">
      <div style="font-size:12.8px;margin-bottom:4px"><b>${escapeHtml(f.status)}</b></div>
      <div style="background:${MICRO_BRAND_LIGHT};border-radius:8px;height:26px">
        <div style="height:100%;border-radius:8px;background:${MICRO_BRAND};width:${Math.max(f.count?10:0,Math.round(f.count/maxFunnel*100))}%;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;min-width:${f.count?'28px':'0'}">
          ${f.count ? `<b style="color:#fff;font-size:12px">${f.count}</b>` : ""}
        </div>
      </div>
    </div>`).join("");

  const bcgBubbles = s.bloggerAgg;
  const bcg = bcgBubbles.length>=2 ? (()=>{
    const W=560,H=260,pad=42;
    const maxRomi = Math.max(0.1, ...bcgBubbles.map(a=>a.romi));
    const maxReach = Math.max(1, ...bcgBubbles.map(a=>a.reach));
    const maxCost = Math.max(1, ...bcgBubbles.map(a=>a.cost));
    const pts = bcgBubbles.map(a=>{
      const x = pad + (a.romi/maxRomi)*(W-2*pad);
      const y = H-pad - (a.reach/maxReach)*(H-2*pad);
      const r = 6 + Math.sqrt(a.cost/maxCost)*22;
      return {x,y,r,login:a.login};
    });

// Метрики за произвольный период для дашборда сравнения микро/средних (аналог periodStats).
function microPeriodStats(rows, from, to){
  const inPeriod = rows.filter(r => inDateRange(microDealDate(r.deal), from, to));
  const dealsCount = inPeriod.length;
  const reach = inPeriod.reduce((s,r)=>s+microDealFactReach(r.deal),0);
  const cost = inPeriod.reduce((s,r)=>s+(r.deal.cost||0),0);
  const contribution = inPeriod.reduce((s,r)=>s+(r.netContribution||0),0);
  const withRomi = inPeriod.filter(r=>r.romi!=null);
  const avgRomi = withRomi.length ? withRomi.reduce((a,r)=>a+r.romi,0)/withRomi.length : null;
  return {dealsCount, reach, cost, contribution, avgRomi};
}
function tplMicroInfluencerCompare(rows){
  const months = microAvailableMonths();
  if(!months.length) return "";
  const cmp = UI.microCompare;
  if(!cmp.aFrom && !cmp.aTo && !cmp.bFrom && !cmp.bTo){
    const first = months[0], last = months[months.length-1];
    cmp.aFrom = first+"-01"; cmp.aTo = monthEnd(first);
    cmp.bFrom = last+"-01"; cmp.bTo = monthEnd(last);
  }
  const a = microPeriodStats(rows, cmp.aFrom, cmp.aTo);
  const b = microPeriodStats(rows, cmp.bFrom, cmp.bTo);
  const metricRow = (label, av, bv, fmt) => `<tr>
    <td>${label}</td>
    <td>${fmt(av)}</td>
    <td>${fmt(bv)}</td>
    <td>${deltaCell(av, bv)}</td>
  </tr>`;
  return `
    <div class="panel">
      <div class="panel-title">Сравнение периодов</div>
      <div class="toolbar" style="margin-bottom:12px;flex-wrap:wrap">
        <span style="align-self:center;color:var(--ink-mute);font-size:12px">Период A</span>
        <input type="date" id="micro-cmp-a-from" value="${cmp.aFrom}">
        <span style="align-self:center;color:var(--ink-mute);font-size:12px">—</span>
        <input type="date" id="micro-cmp-a-to" value="${cmp.aTo}">
        <span style="align-self:center;color:var(--ink-mute);font-size:12px;margin-left:12px">Период B</span>
        <input type="date" id="micro-cmp-b-from" value="${cmp.bFrom}">
        <span style="align-self:center;color:var(--ink-mute);font-size:12px">—</span>
        <input type="date" id="micro-cmp-b-to" value="${cmp.bTo}">
      </div>
      <div class="table-wrap"><table>
        <thead><tr><th>Метрика</th><th>Период A</th><th>Период B</th><th>Δ (B к A)</th></tr></thead>
        <tbody>
          ${metricRow("Интеграций", a.dealsCount, b.dealsCount, v=>fmtNum(v))}
          ${metricRow("Факт.охват", a.reach, b.reach, v=>fmtNum(v))}
          ${metricRow("Расход", a.cost, b.cost, v=>fmtNum(v)+" ₸")}
          ${metricRow("Вклад в продажи", Math.round(a.contribution), Math.round(b.contribution), v=>fmtNum(v)+" ₸")}
          ${metricRow("Средний ROMI", a.avgRomi, b.avgRomi, v=>v==null?"—":v.toFixed(2))}
        </tbody>
      </table></div>
    </div>
  `;
}

async function withBusy(button, fn){
  // блокирует кнопку на время сетевого запроса, чтобы не наслать двойной клик
  if(!button) return fn();
  const original = button.textContent;
  button.disabled = true;
  try{ return await fn(); }
  finally{ button.disabled = false; button.textContent = original; }
}

function loadSession(){
  try{

    if(raw){
      const s = JSON.parse(raw);
      UI.role = s.role || null; UI.driverCode = s.driverCode || null; UI.authToken = s.authToken || null;
    }
  }catch(e){}
}
function saveSession(){
  try{ localStorage.setItem(SESSION_KEY, JSON.stringify({role:UI.role, driverCode:UI.driverCode, authToken:UI.authToken})); }catch(e){}
}
function logout(){
  // сообщаем серверу, что токен больше не нужен (сессия реально живёт на сервере,
  // а не только в localStorage) — но даже если запрос не пройдёт, разлогиниваемся
  // локально в любом случае.
  if(UI.authToken) Api.logout().catch(()=>{});
  UI.role = null; UI.driverCode = null; UI.authToken = null; UI.tab = "dashboard"; saveSession(); render();
}
// Используется, когда сервер сам сообщил, что сессия недействительна (401 на
// запросе, где мы считали себя залогиненными) — например, после рестарта сервера.
function forceLogout(reason){
  UI.role = null; UI.driverCode = null; UI.authToken = null; UI.tab = "dashboard";

  render();

}

  const total = orders.length;

  const problem = orders.filter(o=>(STATUS_META[o.status]||{}).group==="problem").length;
  const noPhoto = orders.filter(o=>o.status==="delivered" && !o.photo).length;
  const unassigned = orders.filter(o=>!o.driverCode).length;
  const ms = marketingSummary();

  const perDriver = drivers.map(d=>{
    const own = orders.filter(o=>o.driverCode===d.code);
    return {d, total:own.length, done:own.filter(o=>o.status==="delivered").length,
      problem:own.filter(o=>(STATUS_META[o.status]||{}).group==="problem").length};
  });

  return `
    <div class="grid-kpi">
      <div class="kpi"><div class="num">${total}</div><div class="lbl">Всего доставок</div></div>
      <div class="kpi ok"><div class="num">${delivered}</div><div class="lbl">Доставлено</div></div>
      <div class="kpi warn"><div class="num">${problem}</div><div class="lbl">Требуют реакции</div></div>
      <div class="kpi"><div class="num">${unassigned}</div><div class="lbl">Не назначены</div></div>
      <div class="kpi bad"><div class="num">${noPhoto}</div><div class="lbl">Доставлено без фото</div></div>
    </div>

    <div class="panel">
      <div class="panel-title">Маркетинг: охват и продажи
        <span style="font-weight:400;color:var(--ink-mute);font-size:11.5px">детали — вкладка «Сводный отчёт» или роль «Маркетолог»</span>
      </div>
      <div class="grid-kpi" style="margin-bottom:0">
        <div class="kpi ok"><div class="num">${fmtNum(ms.totalReach)}</div><div class="lbl">Суммарный охват</div></div>
        <div class="kpi"><div class="num">${fmtPercent(ms.avgEr)}</div><div class="lbl">Средний ER</div></div>
        <div class="kpi ok"><div class="num">${fmtNum(ms.totalRevenue)} ₸</div><div class="lbl">Выручка по промокодам</div></div>
        <div class="kpi warn"><div class="num">${ms.gap.length}</div><div class="lbl">Ждут публикации</div></div>
        <div class="kpi bad"><div class="num">${fmtNum(totalExpense())} ₸</div><div class="lbl">Расходы на бартер</div></div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">Бартер-проекты</div>
      ${campaigns.map(c=>{
        const own = orders.filter(o=>o.campaignId===c.id);
        const pct = own.length ? Math.round(own.filter(o=>o.status==="delivered").length/own.length*100) : 0;
        const exp = campaignExpense(c);
        return `<div style="margin-bottom:12px">
          <div style="display:flex;justify-content:space-between;font-size:13px">
            <b>${escapeHtml(c.name)}</b><span>${escapeHtml(c.stage)} · ${pct}% · Расход: ${fmtNum(exp.total)} ₸</span>
          </div>
          <div class="pbar"><span style="width:${pct}%"></span></div>
        </div>`;
      }).join("") || `<div class="empty">Пока нет ни одного проекта</div>`}
    </div>

    <div class="panel">
      <div class="panel-title">Загрузка водителей</div>
      <div class="table-wrap"><table>
        <thead><tr><th>Водитель</th><th>Город</th><th>Всего</th><th>Доставлено</th><th>Проблемные</th></tr></thead>
        <tbody>
          ${perDriver.map(p=>`<tr>
            <td>${escapeHtml(p.d.name)}</td><td>${escapeHtml(p.d.city)}</td>
            <td>${p.total}</td><td>${p.done}</td><td>${p.problem}</td>
          </tr>`).join("") || `<tr><td class="empty" colspan="5">Нет водителей</td></tr>`}
        </tbody>
      </table></div>
    </div>
  `;
}

/* ---------- Дашборд маркетолога ---------- */
// Тулбар периода наверху дашборда: диапазон дат (свои "с"/"по"), либо быстрые пресеты —
// сегодня / эта неделя / этот месяц. Фильтрует все блоки ниже (охваты/продажи/инфлюенс/топ-3)
// по дате публикации; "На доставке" и "Доставлено, но нет публикации" — это текущее состояние
// очереди, а не история, поэтому период на них не влияет.
function tplDashPeriodPicker(){
  const f = UI.dashPeriod;
  const wk = weekRangeStr(), mo = monthRangeStr(), td = todayStr();
  const isActive = (from,to)=> f.from===from && f.to===to;
  return `
    <div class="toolbar" style="gap:8px;margin-bottom:12px">
      <span style="align-self:center;color:var(--ink-mute);font-size:12px">Период</span>
      <input type="date" id="dash-period-from" value="${f.from}">
      <span style="align-self:center;color:var(--ink-mute);font-size:12px">—</span>
      <input type="date" id="dash-period-to" value="${f.to}">
      <button class="btn btn-sm ${isActive(td,td)?'btn-primary':'btn-ghost'}" id="dash-period-today">Сегодня</button>
      <button class="btn btn-sm ${isActive(wk.from,wk.to)?'btn-primary':'btn-ghost'}" id="dash-period-week">Эта неделя</button>
      <button class="btn btn-sm ${isActive(mo.from,mo.to)?'btn-primary':'btn-ghost'}" id="dash-period-month">Этот месяц</button>
      ${(f.from || f.to) ? `<button class="btn btn-ghost btn-sm" id="dash-period-clear">Весь период</button>` : ""}

}

  const f = UI.dashPeriod;

    <div class="panel-title">Бартерные рассылки</div>

      <div class="kpi warn"><div class="num">${ms.gap.length}</div><div class="lbl">Доставлено, но нет публикации</div></div>
      <div class="kpi ok"><div class="num">${fmtNum(ms.totalReach)}</div><div class="lbl">Суммарный охват</div></div>
      <div class="kpi"><div class="num">${fmtPercent(ms.avgEr)}</div><div class="lbl">Средний ER</div></div>
