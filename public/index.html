/* ---------- Отправка блогерам (доставки) ---------- */
function tplDeliveries(){
  const {orders, drivers, campaigns} = DataManager.state;
  const f = UI.filters;
  const cities = [...new Set(orders.map(o=>o.city))];
  let rows = orders.filter(o=>{
    if(f.campaign && String(o.campaignId)!==f.campaign) return false;
    if(f.driver){ if(f.driver==="__none__" ? o.driverCode : o.driverCode!==f.driver) return false; }
    if(f.city && o.city!==f.city) return false;
    if(f.status){
      if(f.status==="__problem__" && (STATUS_META[o.status]||{}).group!=="problem") return false;
      else if(f.status!=="__problem__" && o.status!==f.status) return false;
    }
    if(f.search){
      const s = f.search.toLowerCase();
      if(!(o.blogger.toLowerCase().includes(s) || o.address.toLowerCase().includes(s) || o.phone.includes(s))) return false;
    }
    if((f.dateFrom || f.dateTo) && !inDateRange(o.deliveredAt || o.assignedAt, f.dateFrom, f.dateTo)) return false;
    return true;
  });
  // Если отфильтровано по конкретному водителю и для него уже построен маршрут —
  // показываем доставки в порядке маршрута (у кого routeOrder нет — в конец списка).
  if(f.driver && f.driver!=="__none__" && rows.some(o=>o.routeOrder)){
    rows = rows.slice().sort((a,b)=>(a.routeOrder||9999)-(b.routeOrder||9999));
  }

  return `
    <div class="panel">
      <div class="panel-title">
        Отправка блогерам
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-ghost btn-sm" id="template-orders-csv-btn">Скачать шаблон CSV</button>
          <button class="btn btn-ghost btn-sm" id="import-csv-btn">Импорт CSV</button>
          <input type="file" id="import-csv-input" accept=".csv" class="hide">
          <button class="btn btn-ghost btn-sm" id="export-csv-btn">Экспорт отчёта</button>
          ${f.driver && f.driver!=="__none__" ? `<button class="btn btn-ghost btn-sm" id="build-route-btn">🗺️ Построить маршрут</button>` : ""}
          <button class="btn btn-primary btn-sm" id="new-delivery-btn">+ Доставка вручную</button>
        </div>
      </div>
      <div class="login-hint" style="margin-bottom:12px">
        В шаблоне есть колонка «подписчики» — заполните её при загрузке базы блогеров, тогда после доставки и публикации
        охват можно будет оценить (15% от подписчиков), даже если блогер не поделится просмотрами сторис.
      </div>
      <div class="toolbar">
        <input type="search" class="fill" id="f-search" placeholder="Поиск: блогер, адрес, телефон" value="${escapeHtml(f.search)}">
        <select id="f-campaign"><option value="">Все проекты</option>${campaigns.map(c=>`<option value="${c.id}" ${f.campaign==String(c.id)?'selected':''}>${escapeHtml(c.name)}</option>`).join("")}</select>
        <select id="f-driver"><option value="">Все водители</option>${drivers.map(d=>`<option value="${d.code}" ${f.driver===d.code?'selected':''}>${escapeHtml(d.name)}</option>`).join("")}<option value="__none__" ${f.driver==='__none__'?'selected':''}>Без водителя</option></select>
        <select id="f-city"><option value="">Все города</option>${cities.map(c=>`<option ${f.city===c?'selected':''}>${escapeHtml(c)}</option>`).join("")}</select>
        <select id="f-status">
          <option value="">Все статусы</option>
          <option value="__problem__" ${f.status==='__problem__'?'selected':''}>⚠️ Требует реакции</option>
          ${Object.entries(STATUS_META).map(([k,m])=>`<option value="${k}" ${f.status===k?'selected':''}>${escapeHtml(m.label)}</option>`).join("")}
        </select>
        <span style="align-self:center;color:var(--ink-mute);font-size:12px">дата с</span>
        <input type="date" id="f-date-from" value="${f.dateFrom||''}">
        <span style="align-self:center;color:var(--ink-mute);font-size:12px">по</span>
        <input type="date" id="f-date-to" value="${f.dateTo||''}">
        <button class="btn btn-ghost btn-sm" id="clear-filters-btn">Сброс</button>
      </div>

      <div class="toolbar" id="bulk-bar" style="${UI.selectedOrderIds.size? '':'display:none'}">
        <span>${UI.selectedOrderIds.size} выбрано</span>
        <select id="bulk-driver-select"><option value="">Назначить водителя…</option>${drivers.filter(d=>d.active).map(d=>`<option value="${d.code}">${escapeHtml(d.name)}</option>`).join("")}</select>
        <button class="btn btn-primary btn-sm" id="bulk-assign-btn">Назначить</button>
        <button class="btn btn-danger btn-sm" id="bulk-delete-btn">Удалить выбранные</button>
      </div>

      <div class="table-wrap"><table>
        <thead><tr>
          <th class="rowcheck"><input type="checkbox" id="check-all"></th>
          <th>№</th><th>№ марш.</th><th>Блогер</th><th>Город</th><th>Район</th><th>Адрес</th><th>Телефон</th><th>Бокс</th><th>Логистика</th>
          <th>Водитель</th><th>Статус</th><th>Дата</th><th>Фото</th><th>Закрытие</th><th>Bitrix</th><th></th>
        </tr></thead>
        <tbody>
          ${rows.map(o=>`
            <tr>
              <td class="rowcheck"><input type="checkbox" class="row-check" data-id="${o.id}" ${UI.selectedOrderIds.has(o.id)?'checked':''}></td>
              <td>#${o.id}</td>
              <td>${o.routeOrder||"—"}</td>
              <td>${escapeHtml(o.blogger)}</td>
              <td>${escapeHtml(o.city)}</td>
              <td>${escapeHtml(o.district||"—")}</td>
              <td class="wrap">${escapeHtml(o.address)}</td>
              <td>${escapeHtml(o.phone)}</td>
              <td>${escapeHtml(o.box)}</td>
              <td><input type="number" class="order-logistics-input" data-id="${o.id}" value="${o.logisticsCost ?? LOGISTICS_COST_DEFAULT}" style="width:80px" title="Стоимость логистики этой доставки, ₸"></td>
              <td>
                <select class="order-driver-select" data-id="${o.id}">
                  <option value="">—</option>
                  ${drivers.map(d=>`<option value="${d.code}" ${o.driverCode===d.code?'selected':''}>${escapeHtml(d.name)}</option>`).join("")}
                </select>
              </td>
              <td>${statusBadge(o.status)}</td>
              <td>${escapeHtml(o.deliveredAt || o.assignedAt || "—")}</td>
              <td>${o.photo ? `<button class="btn btn-ghost btn-sm view-photo-btn" data-id="${o.id}">Фото</button>` : (o.status==="delivered" ? '<span style="color:var(--bad)">нет</span>' : "—")}</td>
              <td>
                ${o.status==="delivered" ? `
                <select class="order-closure-select" data-id="${o.id}">
                  <option value="">Не выбрано</option>
                  ${Object.entries(CLOSURE_TYPES).map(([k,l])=>`<option value="${k}" ${o.closureType===k?'selected':''}>${l}</option>`).join("")}
                </select>` : "—"}
              </td>
              <td>${o.status==="delivered" ? `<button class="btn btn-sm ${o.bitrixSynced?'btn-ghost':'btn-primary'} sync-bitrix-btn" data-id="${o.id}">${o.bitrixSynced?'✓ синхр.':'Отправить'}</button>` : "—"}</td>
              <td><button class="btn btn-danger btn-sm del-order-btn" data-id="${o.id}">✕</button></td>
            </tr>
          `).join("") || `<tr><td colspan="15" class="empty">Ничего не найдено по фильтрам</td></tr>`}
        </tbody>
      </table></div>
    </div>
  `;
}

/* ---------- Топ блогеров ---------- */
function tplTopBloggers(){
  const {publications} = DataManager.state;
  const sortBy = UI.topSort || "views";
  const ranked = publications.map(p=>{
    const o = DataManager.find("orders", p.orderId);
    const m = latestMeasurement(p);
    const r = o ? reachInfo(o, p, m) : {value:0, estimated:false};
    return {p,o,m,r};
  }).filter(x=>x.o && (x.m || x.r.value>0));
  ranked.sort((a,b)=>{
    if(sortBy==="sales") return ((b.m&&b.m.salesRevenue)||0)-((a.m&&a.m.salesRevenue)||0);
    if(sortBy==="er") return (erPercent(b.m)||0)-(erPercent(a.m)||0);
    return b.r.value-a.r.value;
  });
  const medals = ["🥇","🥈","🥉"];
  return `
    <div class="panel">
      <div class="panel-title">Топ блогеров
        <select id="top-sort-select">
          <option value="views" ${sortBy==='views'?'selected':''}>По охвату</option>
          <option value="er" ${sortBy==='er'?'selected':''}>По вовлечённости (ER)</option>

        <tbody>
          ${ranked.map((x,i)=>`<tr>
            <td>${i<3?medals[i]:i+1}</td>
            <td>${escapeHtml(x.o.blogger)}</td>
            <td>${escapeHtml(campaignName(x.o.campaignId))}</td>
            <td>${escapeHtml(x.p.platform)}</td>
            <td>${escapeHtml(x.p.tier)}</td>

      </table></div>
    </div>
  `;
}

/* ---------- Дашборд сравнения периодов (по инфлюенс-интеграциям) ---------- */
function tplInfluencerCompare(rows){
  const months = inflAvailableMonths();
  if(!months.length) return "";
  const cmp = UI.inflCompare;
  // По умолчанию (пока пользователь ничего не выбрал) сравниваем первый и последний месяц с данными.
  if(!cmp.aFrom && !cmp.aTo && !cmp.bFrom && !cmp.bTo){
    const first = months[0], last = months[months.length-1];
    cmp.aFrom = first+"-01"; cmp.aTo = monthEnd(first);
    cmp.bFrom = last+"-01"; cmp.bTo = monthEnd(last);
  }
  const a = periodStats(rows, cmp.aFrom, cmp.aTo);
  const b = periodStats(rows, cmp.bFrom, cmp.bTo);
  const metricRow = (label, av, bv, fmt) => `<tr>
    <td>${label}</td>
    <td>${fmt(av)}</td>
    <td>${fmt(bv)}</td>
    <td>${deltaCell(av, bv)}</td>
  </tr>`;
  return `
    <div class="panel">
      <div class="panel-title">Сравнение периодов</div>
      <div class="toolbar" style="margin-bottom:12px;flex-wrap:wrap">
        <span style="align-self:center;color:var(--ink-mute);font-size:12px">Период A</span>
        <input type="date" id="cmp-a-from" value="${cmp.aFrom}">
        <span style="align-self:center;color:var(--ink-mute);font-size:12px">—</span>
        <input type="date" id="cmp-a-to" value="${cmp.aTo}">
        <span style="align-self:center;color:var(--ink-mute);font-size:12px;margin-left:12px">Период B</span>
        <input type="date" id="cmp-b-from" value="${cmp.bFrom}">
        <span style="align-self:center;color:var(--ink-mute);font-size:12px">—</span>
        <input type="date" id="cmp-b-to" value="${cmp.bTo}">
      </div>
      <div class="table-wrap"><table>
        <thead><tr><th>Метрика</th><th>Период A</th><th>Период B</th><th>Δ (B к A)</th></tr></thead>
        <tbody>
          ${metricRow("Постов", a.postsCount, b.postsCount, v=>fmtNum(v))}
          ${metricRow("Охват, факт", a.reach, b.reach, v=>fmtNum(v))}
          ${metricRow("Клики, факт", a.clicks, b.clicks, v=>fmtNum(v))}
          ${metricRow("Расход", a.cost, b.cost, v=>fmtNum(v)+" ₸")}
          ${metricRow("Вклад в продажи", Math.round(a.contribution), Math.round(b.contribution), v=>fmtNum(v)+" ₸")}
          ${metricRow("Средний ROMI", a.avgRomi, b.avgRomi, v=>v==null?"—":v.toFixed(2))}
        </tbody>
      </table></div>
    </div>
  `;
}

  }
  if(fi.month){
    rows = rows.filter(r=> inflDealDate(r.deal).slice(0,7)===fi.month);
  }
  const sorters = {
    sales_desc: (a,b)=> (b.netContribution||0)-(a.netContribution||0),
    sales_asc: (a,b)=> (a.netContribution||0)-(b.netContribution||0),
    reach_desc: (a,b)=> (b.deal.reach||0)-(a.deal.reach||0),
    reach_asc: (a,b)=> (a.deal.reach||0)-(b.deal.reach||0),
    clicks_desc: (a,b)=> (b.deal.clicks||0)-(a.deal.clicks||0),
    clicks_asc: (a,b)=> (a.deal.clicks||0)-(b.deal.clicks||0),
    cost_desc: (a,b)=> (b.deal.cost||0)-(a.deal.cost||0),
    cost_asc: (a,b)=> (a.deal.cost||0)-(b.deal.cost||0),
    romi_desc: (a,b)=> (b.romi==null?-Infinity:b.romi)-(a.romi==null?-Infinity:a.romi),
    romi_asc: (a,b)=> (a.romi==null?Infinity:a.romi)-(b.romi==null?Infinity:b.romi),
  };
  if(sorters[fi.sort]) rows = rows.slice().sort(sorters[fi.sort]);
  return rows;

/* ---------- Инфлюенс интеграции микро/средние (отв. Нина) ---------- */
function tplMicroInfluencers(){
  const s = microInfluencerSummary();
  const mf = UI.microFilter;
  let deals = s.deals;
  if(mf.search){
    const q = mf.search.toLowerCase();
    deals = deals.filter(d=> (d.blogerName||"").toLowerCase().includes(q) || (d.product||"").toLowerCase().includes(q));
  }
  if(mf.paymentStatus){
    deals = deals.filter(d=> d.paymentStatus===mf.paymentStatus);
  }
  // Вклад в продажи/ROMI посчитаны в microInfluencerSummary() через romiRows — раскладываем
  // по id сделки, чтобы показать в таблице рядом с каждой интеграцией (как в "Инфлюенс интеграции крупные").
  const romiById = {};
  s.romiRows.forEach(r=>{ romiById[r.deal.id] = r; });
  const sorters = {
    cost_desc: (a,b)=> (b.cost||0)-(a.cost||0),
    cost_asc: (a,b)=> (a.cost||0)-(b.cost||0),
    reach_desc: (a,b)=> microDealFactReach(b)-microDealFactReach(a),
    reach_asc: (a,b)=> microDealFactReach(a)-microDealFactReach(b),
    cpv_desc: (a,b)=> (microDealCpv(b)==null?-Infinity:microDealCpv(b))-(microDealCpv(a)==null?-Infinity:microDealCpv(a)),
    cpv_asc: (a,b)=> (microDealCpv(a)==null?Infinity:microDealCpv(a))-(microDealCpv(b)==null?Infinity:microDealCpv(b)),
    sales_desc: (a,b)=> ((romiById[b.id]||{}).netContribution||0)-((romiById[a.id]||{}).netContribution||0),
    sales_asc: (a,b)=> ((romiById[a.id]||{}).netContribution||0)-((romiById[b.id]||{}).netContribution||0),
    romi_desc: (a,b)=> {
      const av=(romiById[a.id]||{}).romi, bv=(romiById[b.id]||{}).romi;
      return (bv==null?-Infinity:bv)-(av==null?-Infinity:av);
    },
    romi_asc: (a,b)=> {
      const av=(romiById[a.id]||{}).romi, bv=(romiById[b.id]||{}).romi;
      return (av==null?Infinity:av)-(bv==null?Infinity:bv);
    },
  };
  if(sorters[mf.sort]) deals = deals.slice().sort(sorters[mf.sort]);

  return `
    ${tplMicroInfluencerBrandDashboard(s.romiRows)}
    ${tplMicroInfluencerCompare(s.romiRows)}

    <div class="grid-kpi">
      <div class="kpi"><div class="num">${s.count}</div><div class="lbl">Всего интеграций</div></div>
      <div class="kpi"><div class="num">${s.uniqueBloggerCount}</div><div class="lbl">Уникальных блогеров (один может продавать пакетом несколько интеграций)</div></div>
      <div class="kpi bad"><div class="num">${fmtNum(s.totalCost)} ₸</div><div class="lbl">Сумма (${s.paidCount} оплачено, ${s.toPayCount} к оплате, ${s.unpaidCount} не оплачено)</div></div>
      <div class="kpi ok"><div class="num">${fmtNum(s.totalFactReach)}</div><div class="lbl">Факт.охват (Reels+TikTok)</div></div>
      <div class="kpi"><div class="num">${s.avgCpv==null?'—':s.avgCpv.toFixed(3)+' ₸'}</div><div class="lbl">Средний CPV (сумма/факт.охват)</div></div>
      <div class="kpi"><div class="num">${s.publishedCount}</div><div class="lbl">Опубликовано видео (план ${s.count})</div></div>
      <div class="kpi warn"><div class="num">${s.pendingCount}</div><div class="lbl">Ещё запланировано (не оплачено и не опубликовано)</div></div>
    </div>
    <div class="panel">
      <div class="panel-title">
        Инфлюенс интеграции микро/средние
        <span style="font-weight:400;color:var(--ink-mute);font-size:11.5px">отв. Нина</span>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-ghost btn-sm" id="template-micro-csv-btn">Шаблон CSV</button>
          <button class="btn btn-ghost btn-sm" id="export-micro-csv-btn">Экспорт CSV</button>
          <button class="btn btn-ghost btn-sm" id="import-micro-csv-btn">Импорт CSV</button>
          <input type="file" id="import-micro-csv-input" accept=".csv" class="hide">
          <button class="btn btn-primary btn-sm" id="new-micro-btn">+ Интеграция</button>
        </div>
      </div>
      <div class="login-hint" style="margin-bottom:12px">
        «Вклад в продажи» и ROMI считаются только там, где у интеграции указан ШК товара —
        по нему сопоставляем с продажами из 1С (импорт по вторникам) и раскладываем прирост
        между интеграциями, вышедшими за 0-2 дня до продажи. Без ШК — только CPV = сумма / факт.охват
        (Reels + TikTok кросспостинг).
      </div>
      <div class="toolbar" style="margin-bottom:12px">
        <input type="search" class="fill" id="micro-search" placeholder="Поиск по блогеру / товару" value="${escapeHtml(mf.search)}">
        <select id="micro-payment-filter">
          <option value="">Все статусы оплаты</option>
          ${MICRO_PAYMENT_STATUSES.map(st=>`<option value="${st}" ${mf.paymentStatus===st?'selected':''}>${st}</option>`).join("")}
        </select>
        <select id="micro-sort">
          <option value="default" ${mf.sort==='default'?'selected':''}>Без сортировки</option>
          <option value="cost_desc" ${mf.sort==='cost_desc'?'selected':''}>Сумма: сначала больше</option>
          <option value="cost_asc" ${mf.sort==='cost_asc'?'selected':''}>Сумма: сначала меньше</option>
          <option value="reach_desc" ${mf.sort==='reach_desc'?'selected':''}>Факт.охват: сначала больше</option>
          <option value="reach_asc" ${mf.sort==='reach_asc'?'selected':''}>Факт.охват: сначала меньше</option>
          <option value="cpv_desc" ${mf.sort==='cpv_desc'?'selected':''}>CPV: сначала больше</option>
          <option value="cpv_asc" ${mf.sort==='cpv_asc'?'selected':''}>CPV: сначала меньше</option>
          <option value="sales_desc" ${mf.sort==='sales_desc'?'selected':''}>Вклад в продажи: сначала больше</option>
          <option value="sales_asc" ${mf.sort==='sales_asc'?'selected':''}>Вклад в продажи: сначала меньше</option>
          <option value="romi_desc" ${mf.sort==='romi_desc'?'selected':''}>ROMI: сначала больше</option>
          <option value="romi_asc" ${mf.sort==='romi_asc'?'selected':''}>ROMI: сначала меньше</option>
        </select>
      </div>
      <div class="login-hint" style="margin-bottom:12px">
        Кликните по значению в таблице, чтобы отредактировать его прямо на месте (как в Excel) —
        Enter или клик вне поля сохраняет, Esc отменяет. Карандаш ✎ по-прежнему открывает полную форму,
        если нужно поле, которого нет в таблице. Колонки CPV, «Вклад в продажи» и ROMI считаются
        автоматически (по сумме, стоимости товара, факт.охвату и продажам из 1С) и вручную не редактируются —
        поменяются сами, если поправить факт.охват или сумму.
      </div>
      <div class="table-wrap"><table>
        <thead><tr>
          <th>Блогер</th><th>Instagram</th><th>TikTok</th><th>Товар</th><th>Город</th>
          <th>Сумма</th><th>Стоимость товара</th><th>Статус оплаты</th><th>Факт.охват</th><th>CPV</th>
          <th>Вклад в продажи</th><th>ROMI</th>
          <th>Статус товара</th><th>Статус видео</th><th>Дата выкладки</th><th>Ссылка на Reels</th><th></th>
        </tr></thead>
        <tbody>
          ${deals.map(d=>{
            const factReach = microDealFactReach(d);
            const cpv = microDealCpv(d);
            const r = romiById[d.id];
            const hasBaseline = r && r.hasBaseline;
            return `<tr>
              <td>${inlineEditSpan(`<b>${escapeHtml(d.blogerName)}</b>`, d.id, 'blogerName', d.blogerName||'', 'text')}${d.phone?`<br><span style="color:var(--ink-mute);font-size:11px">${escapeHtml(d.phone)}</span>`:""}</td>
              <td>${d.instagramAccount?`<a href="${escapeHtml(d.instagramAccount)}" target="_blank" rel="noopener">IG</a> `:""}${inlineEditSpan(fmtNum(d.followers||0), d.id, 'followers', d.followers||0, 'number')}</td>

              <td>${inlineEditSpan(escapeHtml(d.product||"—"), d.id, 'product', d.product||'', 'text')}<br><span style="color:var(--ink-mute);font-size:11px">ШК ${inlineEditSpan(escapeHtml(d.barcode||"—"), d.id, 'barcode', d.barcode||'', 'text')}</span></td>

              <td title="Считается автоматически из продаж по ШК (импорт по вторникам) — вручную не редактируется">${!d.barcode ? '<span style="color:var(--ink-mute)">нет ШК</span>' : (hasBaseline ? fmtNum(r.netContribution)+" ₸" : '<span style="color:var(--ink-mute)">—</span>')}</td>

/* ---------- Сводный отчёт ---------- */
function tplReport(){
  const {orders, campaigns} = DataManager.state;
  const f = UI.filters;
  let rows = orders.filter(o=>{
    if(f.campaign && String(o.campaignId)!==f.campaign) return false;
    if(f.search){
      const s = f.search.toLowerCase();
      if(!(o.blogger.toLowerCase().includes(s) || o.address.toLowerCase().includes(s))) return false;
    }
    if(f.dateFrom || f.dateTo){
      const pub = pubOf(o.id);
      const inDelivery = inDateRange(o.deliveredAt, f.dateFrom, f.dateTo);
      const inPub = inDateRange(pub && pub.publishedAt, f.dateFrom, f.dateTo);
      if(!inDelivery && !inPub) return false;
    }
    return true;
  });
  const pc = publicationComplianceSummary();
  return `
    <div class="panel">
      <div class="panel-title">Выкладка: доставлено → выложено
        <span style="font-weight:400;color:var(--ink-mute);font-size:11.5px">кликните проект в таблице, чтобы отфильтровать список ниже</span>
      </div>
      <div class="grid-kpi" style="margin-bottom:12px">
        <div class="kpi ${pc.pct==null?'':(pc.pct>=80?'ok':pc.pct>=50?'warn':'bad')}"><div class="num">${pc.pct==null?'—':pc.pct+'%'}</div><div class="lbl">Выложено от доставленного</div></div>
        <div class="kpi ok"><div class="num">${pc.postedCount}</div><div class="lbl">Выложено (${pc.withLink} со ссылкой, ${pc.withoutLink} сторис без)</div></div>
        <div class="kpi warn"><div class="num">${pc.waitingCount}</div><div class="lbl">Ждут выкладки</div></div>
        <div class="kpi"><div class="num">${pc.avgLagDays==null?'—':pc.avgLagDays.toFixed(1)}</div><div class="lbl">Среднее дней доставка → выкладка</div></div>
      </div>
      ${pc.waitingCount ? `
      <div class="grid-kpi" style="margin-bottom:12px">
        <div class="kpi"><div class="num">${pc.ageBuckets.fresh}</div><div class="lbl">Ждут 0–3 дня</div></div>
        <div class="kpi warn"><div class="num">${pc.ageBuckets.mid}</div><div class="lbl">Ждут 4–7 дней</div></div>
        <div class="kpi bad"><div class="num">${pc.ageBuckets.stale}</div><div class="lbl">Ждут больше недели</div></div>
      </div>` : ""}
      <div class="table-wrap"><table>
        <thead><tr><th>Проект</th><th>Доставлено</th><th>Выложено</th><th>Ждут</th><th>%</th></tr></thead>
        <tbody>
          ${pc.byCampaign.map(x=>`<tr>
            <td><button class="link-btn pub-camp-link" data-id="${x.campaign.id}"><b>${escapeHtml(x.campaign.name)}</b></button></td>
            <td>${x.deliveredCount}</td>
            <td>${x.postedCount}</td>
            <td>${x.waitingCount ? `<b style="color:var(--warn)">${x.waitingCount}</b>` : "0"}</td>
            <td>${x.pct==null?'—':x.pct+'%'}</td>
          </tr>`).join("") || `<tr><td class="empty" colspan="5">Пока нет доставленных заказов</td></tr>`}
        </tbody>
      </table></div>
    </div>
    <div class="panel">
      <div class="panel-title">Сводный отчёт: логистика + доставка + маркетинг
        <button class="btn btn-ghost btn-sm" id="export-report-csv-btn">Экспорт CSV</button>
      </div>
      <div class="toolbar">
        <input type="search" class="fill" id="fr-search" placeholder="Поиск по блогеру / адресу" value="${escapeHtml(f.search)}">
        <select id="fr-campaign"><option value="">Все проекты</option>${campaigns.map(c=>`<option value="${c.id}" ${f.campaign==String(c.id)?'selected':''}>${escapeHtml(c.name)}</option>`).join("")}</select>
        <span style="align-self:center;color:var(--ink-mute);font-size:12px">дата (доставка/публ.) с</span>

        <input type="date" id="fr-date-to" value="${f.dateTo||''}">
      </div>
      ${(()=>{
        const rowIds = rows.map(o=>o.id);
        [...UI.selectedPubIds].forEach(id=>{ if(!rowIds.includes(id)) UI.selectedPubIds.delete(id); });

      <div class="table-wrap"><table>

            return `<tr>
              <td class="rowcheck"><input type="checkbox" class="rep-row-check" data-id="${o.id}" ${UI.selectedPubIds.has(o.id)?'checked':''}></td>

              <td>${pubStatusBadge(o, pub, "rep-")}</td>
              <td>${escapeHtml(o.deliveredAt||"—")}</td>
              <td>${pub?escapeHtml(pub.platform):"—"}</td>
              <td>${pub?escapeHtml(pub.publishedAt):"—"}</td>
              <td>${editableMeasureCell(pub, o.id, r.value?fmtNum(r.value)+reachBadge(r):"—")}</td>
              <td>${editableMeasureCell(pub, o.id, m?fmtPercent(erPercent(m)):"—")}</td>

              <td>${editableMeasureCell(pub, o.id, m?fmtNum(m.salesRevenue):"—")}</td>
              <td>${o.status==='delivered' ? (o.bitrixSynced?'✓':'—') : "—"}</td>

                  ? `<button class="btn btn-ghost btn-sm rep-add-measure-btn" data-order="${o.id}">+ Данные</button>

                  : `<button class="btn btn-primary btn-sm rep-add-pub-btn" data-order="${o.id}">Отметить выложено</button>`}

            </tr>`;
          }).join("") || `<tr><td class="empty" colspan="19">Нет данных</td></tr>`}
        </tbody>
      </table></div>
    </div>
  `;
}

function openModal(html){
  const back = document.createElement("div");
  back.className = "modal-back"; back.id = "modal-back";
  back.innerHTML = `<div class="modal">${html}</div>`;
  back.addEventListener("click", e=>{ if(e.target===back) closeModal(); });

}

// Построение маршрута для конкретного водителя: геокодируем адреса без координат
// (бесплатный сервис, ~1 адрес/сек — предупреждаем прогрессом, чтобы не выглядело
// зависшим), считаем порядок объезда "ближайший сосед" и сохраняем № в маршруте
// у каждой доставки + предлагаем открыть готовый маршрут в Google Maps.
async function modalBuildRoute(driverCode){
  const drv = DataManager.state.drivers.find(d=>d.code===driverCode);
  const own = DataManager.state.orders.filter(o=>o.driverCode===driverCode && o.status!=="delivered" && o.status!=="cancelled" && o.address);
  if(!own.length){ toast("У этого водителя нет активных доставок с адресом", true); return; }

  openModal(`
    <h3>Маршрут · ${escapeHtml(drv ? drv.name : driverCode)}</h3>
    <div id="route-progress">
      <p style="color:var(--ink-soft);margin-bottom:8px">Геокодируем адреса (бесплатный сервис, ~1 адрес/сек)…</p>
      <p id="route-progress-text" style="font-weight:600">0 / ${own.length}</p>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="m-cancel">Закрыть</button>
    </div>
  `);
  document.getElementById("m-cancel").onclick = closeModal;

  const progressText = document.getElementById("route-progress-text");
  let done = 0;
  const geocoded = [];
  for(const o of own){
    if(!document.getElementById("route-progress")) return; // модалку закрыли — прерываем
    if(o.lat && o.lng){
      geocoded.push(o);
    }else{
      try{
        const g = await Api.geocode(o.address, o.city);
        await Api.updateOrder(o.id, {lat: g.lat, lng: g.lng, district: g.district || ""});
        o.lat = g.lat; o.lng = g.lng; o.district = g.district || "";
        geocoded.push(o);
      }catch(e){
        // Адрес не нашёлся геосервисом — пропускаем его в маршруте, но не роняем весь процесс
        toast(`Не удалось определить координаты: ${o.blogger} (${o.address})`, true);
      }
    }
    done++;
    if(progressText) progressText.textContent = `${done} / ${own.length}`;
  }

  if(!document.getElementById("route-progress")) return;

  if(geocoded.length<2){
    document.getElementById("route-progress").innerHTML = `<p style="color:var(--bad)">Недостаточно адресов с координатами, чтобы построить маршрут.</p>`;
    return;
  }

  const ordered = nearestNeighborRoute(geocoded);
  for(let i=0;i<ordered.length;i++){
    ordered[i].routeOrder = i+1;
    await Api.updateOrder(ordered[i].id, {routeOrder: i+1});
  }
  await DataManager.refresh();

  const mapsUrl = googleMapsRouteUrl(ordered);
  document.getElementById("route-progress").innerHTML = `
    <p style="color:var(--ink-soft);margin-bottom:8px">Маршрут построен (${ordered.length} точек, по прямой — не по реальным дорогам):</p>
    <div class="table-wrap"><table>
      <thead><tr><th>№</th><th>Блогер</th><th>Район</th><th>Адрес</th></tr></thead>
      <tbody>
        ${ordered.map((o,i)=>`<tr><td>${i+1}</td><td>${escapeHtml(o.blogger)}</td><td>${escapeHtml(o.district||"—")}</td><td>${escapeHtml(o.address)}</td></tr>`).join("")}
      </tbody>
    </table></div>
    <a class="btn btn-primary btn-sm" style="margin-top:10px;display:inline-block" href="${mapsUrl}" target="_blank" rel="noopener">Открыть маршрут в Google Maps</a>
  `;
  toast("Маршрут построен");
  renderDeskTab();
}

function modalBulkMarkPosted(orderIds){
  if(!orderIds.length) return;
  const all = orderIds.map(id=>DataManager.find("orders", id)).filter(Boolean);
  // выбранные могут быть в разных статусах (доставлено / назначено / уже выложено) —
  // отмечаем только те, что реально ждут публикации, остальные молча пропускаем и объясняем почему.
  const eligible = all.filter(o=>o.status==="delivered" && !pubOf(o.id));
  const skippedNotDelivered = all.filter(o=>o.status!=="delivered");
  const skippedAlreadyPosted = all.filter(o=>o.status==="delivered" && pubOf(o.id));

  if(!eligible.length){
    openModal(`
      <h3>Отметить выложено</h3>
      <p style="color:var(--ink-soft)">Ни один из выбранных (${all.length}) не подходит: ${skippedNotDelivered.length?`${skippedNotDelivered.length} ещё не доставлены`:''}${skippedNotDelivered.length&&skippedAlreadyPosted.length?', ':''}${skippedAlreadyPosted.length?`${skippedAlreadyPosted.length} уже выложены`:''}.</p>

    `);
    document.getElementById("m-cancel").onclick = closeModal;
    return;

  openModal(`
    <h3>Отметить выложено · ${eligible.length} блогер(ов)</h3>
    <p style="color:var(--ink-soft);margin-bottom:8px">${eligible.map(o=>escapeHtml(o.blogger)).join(", ")}</p>
    ${(skippedNotDelivered.length || skippedAlreadyPosted.length) ? `
    <div class="login-hint" style="margin-bottom:8px">
      Пропущены (не подходят): ${skippedNotDelivered.length?`${skippedNotDelivered.length} ещё не доставлены`:''}${skippedNotDelivered.length&&skippedAlreadyPosted.length?', ':''}${skippedAlreadyPosted.length?`${skippedAlreadyPosted.length} уже выложены`:''}.

      <div class="field"><label>Категория блогера</label><select id="m-tier">${BLOGGER_TIERS.map(t=>`<option>${t}</option>`).join("")}</select></div>
    </div>
    <div class="login-hint" style="margin-top:6px">
      Эти значения применятся ко всем выбранным. Ссылку и точные охваты/клики/продажи для отдельных публикаций

      <button class="btn btn-ghost" id="m-cancel">Отмена</button>
      <button class="btn btn-primary" id="m-save">Отметить выложено (${eligible.length})</button>
    </div>
  `);
  document.getElementById("m-cancel").onclick = closeModal;
  document.getElementById("m-save").onclick = async ()=>{
    const btn = document.getElementById("m-save");
    const platform = document.getElementById("m-platform").value;
    const publishedAt = document.getElementById("m-date").value;
    const tier = document.getElementById("m-tier").value;
    try{
      await withBusy(btn, async ()=>{
        for(const o of eligible){
          await Api.createPublication({ orderId: o.id, platform, link: "", publishedAt, tier, promoCode: "" });
        }
      });
      closeModal();
      const skipped = skippedNotDelivered.length + skippedAlreadyPosted.length;
      toast(`Отмечено как выложено: ${eligible.length}${skipped?`, пропущено: ${skipped}`:''}`);
      UI.selectedPubIds.clear();
      await DataManager.refresh(); render();
    }catch(e){ toast(e.message, true); await DataManager.refresh(); render(); }
  };

function wireDeskTab(){
  if(UI.tab==="dashboard" && UI.role==="marketer"){
    const dpFrom = document.getElementById("dash-period-from");
    if(dpFrom) dpFrom.onchange = e=>{ UI.dashPeriod.from = e.target.value; renderDeskTab(); };
    const dpTo = document.getElementById("dash-period-to");
    if(dpTo) dpTo.onchange = e=>{ UI.dashPeriod.to = e.target.value; renderDeskTab(); };
    const dpToday = document.getElementById("dash-period-today");
    if(dpToday) dpToday.onclick = ()=>{ const d=todayStr(); UI.dashPeriod = {from:d, to:d}; renderDeskTab(); };
    const dpWeek = document.getElementById("dash-period-week");
    if(dpWeek) dpWeek.onclick = ()=>{ UI.dashPeriod = weekRangeStr(); renderDeskTab(); };
    const dpMonth = document.getElementById("dash-period-month");
    if(dpMonth) dpMonth.onclick = ()=>{ UI.dashPeriod = monthRangeStr(); renderDeskTab(); };
    const dpClear = document.getElementById("dash-period-clear");
    if(dpClear) dpClear.onclick = ()=>{ UI.dashPeriod = {from:"", to:""}; renderDeskTab(); };
  }

  else if(UI.tab==="campaigns"){
    document.getElementById("new-campaign-btn").onclick = modalNewCampaign;
    document.querySelectorAll(".camp-name-link").forEach(btn=>{
      btn.onclick = ()=>{
        UI.filters.campaign = btn.dataset.id;
        UI.tab = "report";
        render();
      };
    });
    document.querySelectorAll(".camp-stage").forEach(sel=>{
      sel.onchange = async ()=>{
        try{ await Api.updateCampaign(parseInt(sel.dataset.id,10), {stage: sel.value}); await DataManager.refresh(); }
        catch(e){ toast(e.message, true); render(); }
      };
    });
    document.querySelectorAll(".camp-costbox").forEach(inp=>{
      inp.onchange = async ()=>{
        const costPerBox = parseInt(inp.value,10) || 0;
        try{ await Api.updateCampaign(parseInt(inp.dataset.id,10), {costPerBox}); await DataManager.refresh(); render(); }
        catch(e){ toast(e.message, true); render(); }
      };
    });
    document.querySelectorAll(".camp-realization").forEach(inp=>{
      inp.onchange = async ()=>{
        const realizationNumber = inp.value.trim();
        try{ await Api.updateCampaign(parseInt(inp.dataset.id,10), {realizationNumber}); await DataManager.refresh(); render(); }
        catch(e){ toast(e.message, true); render(); }
      };
    });
    document.querySelectorAll(".edit-campaign-btn").forEach(btn=>{
      btn.onclick = ()=> modalEditCampaign(parseInt(btn.dataset.id,10));
    });
    document.querySelectorAll(".del-campaign").forEach(btn=>{
      btn.onclick = async ()=>{
        const id = parseInt(btn.dataset.id,10);
        if(DataManager.state.orders.some(o=>o.campaignId===id)){
          if(!confirm("У проекта есть связанные доставки. Удалить проект всё равно?")) return;
        }
        try{ await Api.deleteCampaign(id); toast("Проект удалён"); await DataManager.refresh(); render(); }
        catch(e){ toast(e.message, true); }
      };
    });
  }

  else if(UI.tab==="deliveries"){
    document.getElementById("new-delivery-btn").onclick = modalNewDelivery;
    const buildRouteBtn = document.getElementById("build-route-btn");

function debounce(fn, ms){
  let t;
  return (...args)=>{ clearTimeout(t); t = setTimeout(()=>fn(...args), ms); };
}

/* =========================================================================
   13. ВСТРОЕННЫЕ ТЕСТЫ — только чистые функции, без записи в общую базу
   (мутирующие CRUD-тесты вынесены на сервер: scripts/load-test.js создаёт
   и удаляет тестовые записи в изолированном тестовом запуске, а не в
   продакшн-базе, которую видят реальные пользователи)
   ========================================================================= */
const TestSuite = {
  tests: [],
  test(name, fn){
    try{ fn(); console.log(`✅ ${name}`); this.tests.push({name, passed:true}); }
    catch(e){ console.error(`❌ ${name}: ${e.message}`); this.tests.push({name, passed:false, error:e.message}); }
  },
  run(){
    console.log("🧪 Barter Box (клиент) — запускаю самотест...");
    const passed = this.tests.filter(t=>t.passed).length;
    console.log(`📊 Результат: ${passed}/${this.tests.length} пройдено`);
    return passed === this.tests.length;
  }
};

async function runSelfTests(){
  TestSuite.test("statusBadge возвращает разметку для всех статусов", ()=>{
    Object.keys(STATUS_META).forEach(k=>{
      if(!statusBadge(k).includes(STATUS_META[k].label)) throw new Error("badge label mismatch for "+k);
    });
  });
  TestSuite.test("csvEscape оборачивает поля с запятой в кавычки", ()=>{
    if(csvEscape("a,b") !== '"a,b"') throw new Error("csv escape failed");
  });
  TestSuite.test("parseCsv корректно разбирает строки с запятой-разделителем", ()=>{
    const rows = parseCsv("блогер,телефон,город,адрес\n@test,+7700,Алматы,ул. Тест 1");
    if(rows.length!==1 || rows[0]["блогер"]!=="@test" || rows[0]["адрес"]!=="ул. Тест 1") throw new Error("csv parse mismatch");
  });
  TestSuite.test("parseCsv не разъезжается, если название товара в кавычках содержит запятую", ()=>{
    const rows = parseCsv('дата,продукт,шк,выручка\n2026-07-13,"Бальзам для губ, 03 - Series, 03 4г",4620400203663,176610');
    if(rows.length!==1) throw new Error("ожидалась 1 строка, получили "+rows.length);
    if(rows[0]["продукт"] !== "Бальзам для губ, 03 - Series, 03 4г") throw new Error("название товара с запятой разъехалось: "+JSON.stringify(rows[0]));
    if(rows[0]["шк"] !== "4620400203663") throw new Error("ШК разъехался: "+JSON.stringify(rows[0]));
    if(rows[0]["выручка"] !== "176610") throw new Error("выручка разъехалась: "+JSON.stringify(rows[0]));
  });
  TestSuite.test("parseCsv не разъезжается, если ячейка в кавычках содержит перенос строки (многострочный комментарий из Excel)", ()=>{
    const rows = parseCsv('блогер,условия,город\n"Бота","3 видео - 280к\nгарант просмотры\ntiktok - 30.000+",Алматы\nАдина,,Астана');
    if(rows.length!==2) throw new Error("ожидалось 2 строки, получили "+rows.length+": "+JSON.stringify(rows));
    if(rows[0]["блогер"]!=="Бота") throw new Error("блогер первой строки разъехался: "+JSON.stringify(rows[0]));
    if(rows[0]["условия"]!=="3 видео - 280к\nгарант просмотры\ntiktok - 30.000+") throw new Error("многострочные условия потерялись/разъехались: "+JSON.stringify(rows[0]));
    if(rows[0]["город"]!=="Алматы") throw new Error("город первой строки разъехался (перенос строки не должен был закрыть запись раньше времени): "+JSON.stringify(rows[0]));
    if(rows[1]["блогер"]!=="Адина" || rows[1]["город"]!=="Астана") throw new Error("вторая строка после многострочной ячейки повреждена: "+JSON.stringify(rows[1]));
  });
  TestSuite.test("erPercent считает вовлечённость (лайки+комменты / просмотры)", ()=>{
    const v = erPercent({views:1000, likes:50, comments:10});
    if(Math.abs(v-6)>0.001) throw new Error("ER calc wrong: "+v);
    if(erPercent({views:0, likes:5, comments:1})!==null) throw new Error("ER should be null when views=0");
  });
  TestSuite.test("latestMeasurement возвращает последний по порядку замер", ()=>{
    const pub = {measurements:[{views:1},{views:2},{views:3}]};
    if(latestMeasurement(pub).views!==3) throw new Error("latest measurement wrong");
    if(latestMeasurement({measurements:[]})!==null) throw new Error("empty measurements should return null");
  });
  TestSuite.test("Водитель видит только свои доставки (фильтр по коду)", ()=>{
    const before = UI.driverCode;
    UI.driverCode = DataManager.state.drivers[0] ? DataManager.state.drivers[0].code : "IVAN-77";
    const own = driverOrders();
    if(own.some(o=>o.driverCode!==UI.driverCode)) throw new Error("leak of foreign orders");
    UI.driverCode = before;

    // toast() начинает падать с "Cannot set properties of null" на любом действии пользователя
    // (импорт/экспорт/удаление и т.д.) до следующей полной перезагрузки страницы.
    if(!document.getElementById("toast")) throw new Error("div#toast отсутствует — toast() будет падать на любом действии до перезагрузки страницы");
    toast("проверка toast() из самотеста");
    if(document.getElementById("toast").textContent !== "проверка toast() из самотеста") throw new Error("toast() не записал текст в #toast");
  });
  TestSuite.test("influencerBrandStats считает KPI и лучшего/худшего блогера и интеграцию за месяц", ()=>{
    // Строки уже "посчитаны" (как будто это выход computeInfluencerRomi) — так проще проверить
    // саму агрегацию отдельно от движка ROMI/decay, который уже покрыт своим тестом выше.
    const dealBest = {id:9941, blogerLogin:"@best", platform:"Reels", product:"P1", plannedDate:"2026-07-01", publishedDate:"2026-07-05", plannedReach:9000, plannedClicks:400, reach:10000, clicks:500, plannedCost:1000, cost:1000, status:"Опубликована"};
    const dealWorst = {id:9942, blogerLogin:"@worst", platform:"Stories", product:"P2", plannedDate:"2026-07-02", publishedDate:"2026-07-10", plannedReach:6000, plannedClicks:150, reach:5000, clicks:100, plannedCost:1800, cost:2000, status:"Закрыта"};
    const dealNoData = {id:9943, blogerLogin:"@nodata", platform:"Reels", product:"P3", plannedDate:"2026-07-12", plannedReach:0, plannedClicks:0, reach:1000, clicks:10, plannedCost:0, cost:500, status:"Запланирована"};
    const rows = [
      {deal:dealBest,  netContribution:2500, romi:2.5,  hasBaseline:true},
      {deal:dealWorst, netContribution:500,  romi:0.25, hasBaseline:true},
      {deal:dealNoData,netContribution:0,    romi:null, hasBaseline:false},
    ];
    const s = influencerBrandStats(rows);
    if(s.totalCost!==3500) throw new Error("расходы посчитаны неверно: "+s.totalCost);
    if(s.totalReach!==16000) throw new Error("охват посчитан неверно: "+s.totalReach);
    if(Math.round(s.totalContribution)!==3000) throw new Error("вклад в продажи посчитан неверно: "+s.totalContribution);
    if(Math.abs(s.romi-3000/3500)>0.001) throw new Error("ROMI посчитан неверно: "+s.romi);
    if(Math.abs(s.cpv-3500/16000)>0.001) throw new Error("CPV посчитан неверно: "+s.cpv);
    if(s.dealsCount!==3) throw new Error("кол-во интеграций неверно: "+s.dealsCount);
    if(s.publishedCount!==2) throw new Error("кол-во опубликованных неверно: "+s.publishedCount);
    if(!s.bestBlogger || s.bestBlogger.login!=="@best") throw new Error("лучший блогер определён неверно");
    if(!s.worstBlogger || s.worstBlogger.login!=="@worst") throw new Error("худший блогер определён неверно");
    if(Math.round(s.bestBlogger.profit)!==1500) throw new Error("прибыль лучшего блогера неверна: "+s.bestBlogger.profit);
    if(Math.round(s.worstBlogger.profit)!==-1500) throw new Error("прибыль худшего блогера неверна: "+s.worstBlogger.profit);
    if(!s.bestDeal || s.bestDeal.r.deal.id!==9941) throw new Error("лучшая интеграция определена неверно");
    if(!s.worstDeal || s.worstDeal.r.deal.id!==9942) throw new Error("худшая интеграция определена неверно");
    // "Безданных" интеграция не должна попадать в лучшие/худшие (иначе выглядела бы как чистый убыток).
    if(s.bloggerAgg.some(a=>a.login==="@nodata")) throw new Error("интеграция без базы ROMI не должна попадать в рейтинг");
  });
  TestSuite.test("tplInfluencerBrandDashboard отрисовывает дашборд с реальными данными месяца", ()=>{
    const savedDeals = DataManager.state.influencerDeals;
    const savedDashMonth = UI.inflDashMonth;
    try{
      const dealBest = {id:9951, blogerLogin:"@best2", platform:"Reels", product:"P1", plannedDate:"2026-07-01", publishedDate:"2026-07-05", plannedReach:9000, plannedClicks:400, reach:10000, clicks:500, plannedCost:1000, cost:1000, status:"Опубликована"};
      const dealWorst = {id:9952, blogerLogin:"@worst2", platform:"Stories", product:"P2", plannedDate:"2026-07-02", publishedDate:"2026-07-10", plannedReach:6000, plannedClicks:150, reach:5000, clicks:100, plannedCost:1800, cost:2000, status:"Закрыта"};
      DataManager.state.influencerDeals = [dealBest, dealWorst];
      UI.inflDashMonth = "";
      const rows = [
        {deal:dealBest,  netContribution:2500, romi:2.5,  hasBaseline:true},
        {deal:dealWorst, netContribution:500,  romi:0.25, hasBaseline:true},
      ];
      const html = tplInfluencerBrandDashboard(rows);
      if(!html.includes("Платный инфлюенс")) throw new Error("заголовок дашборда отсутствует");
      if(!html.includes("infl-dash-month-tab")) throw new Error("вкладки месяцев не отрисованы");
      if(!html.includes("@best2") || !html.includes("@worst2")) throw new Error("лучший/худший блогер не показаны");
      if(!html.includes("3\u00a0000") && !html.includes("3 000")) throw new Error("суммарные расходы не отрисованы");
      if(!html.includes(escapeHtml("Опубликована"))) throw new Error("воронка стадий не отрисована");
      if(!html.includes("План затрат на конец месяца")) throw new Error("должен быть KPI 'План затрат на конец месяца'");
      if(!html.includes("2 800") && !html.includes("2 800")) throw new Error("план затрат на конец месяца посчитан неверно (ожидали 2 800 ₸, т.е. 1000+1800)");
    } finally {
      DataManager.state.influencerDeals = savedDeals;
      UI.inflDashMonth = savedDashMonth;
    }
  });
  TestSuite.test("tplInfluencerBrandDashboard: при данных за 2+ года показывает не все вкладки, а выпадающий список + год в подписи", ()=>{
    const savedDeals = DataManager.state.influencerDeals;
    const savedDashMonth = UI.inflDashMonth;
    try{
      // 26 месяцев данных подряд (больше 2 лет) — по одной интеграции на месяц.
      const deals = [];
      const rows = [];
      for(let i=0;i<26;i++){
        const y = 2024 + Math.floor(i/12);
        const mo = (i%12)+1;
        const ym = `${y}-${String(mo).padStart(2,"0")}`;
        const deal = {id:9960+i, blogerLogin:"@m"+i, platform:"Reels", product:"P", plannedDate:ym+"-01", publishedDate:ym+"-01", plannedReach:0, plannedClicks:0, reach:1000, clicks:10, plannedCost:0, cost:100, status:"Опубликована"};
        deals.push(deal);
        rows.push({deal, netContribution:200, romi:2, hasBaseline:true});
      }
      DataManager.state.influencerDeals = deals;
      UI.inflDashMonth = ""; // по умолчанию — последний месяц
      const html = tplInfluencerBrandDashboard(rows);
      const tabCount = (html.match(/infl-dash-month-tab/g)||[]).length;
      if(tabCount > 6) throw new Error("вкладок месяцев больше 6 — при годах данных они не влезут: "+tabCount);
      if(!html.includes("infl-dash-month-select")) throw new Error("выпадающий список 'ещё месяцы' не появился при длинной истории");
      // apostrophe уходит через escapeHtml() как &#39; — проверяем экранированную форму.
      if(!html.includes("&#39;24") || !html.includes("&#39;25") || !html.includes("&#39;26")) throw new Error("год не подписан у месяцев, хотя данных больше одного года");
    } finally {
      DataManager.state.influencerDeals = savedDeals;
      UI.inflDashMonth = savedDashMonth;
    }
  });
  TestSuite.test("reachInfo: оценка 15% только когда доставлено и опубликовано", ()=>{
    const realView = reachInfo({status:"delivered", followers:20000}, {publishedAt:"2026-01-01"}, {views:5000});
    if(realView.value!==5000 || realView.estimated!==false) throw new Error("реальный охват не должен подменяться оценкой");
    const est = reachInfo({status:"delivered", followers:20000}, {publishedAt:"2026-01-01"}, null);
    if(est.value!==3000 || est.estimated!==true) throw new Error("оценка 15% рассчитана неверно: "+JSON.stringify(est));
    const notDelivered = reachInfo({status:"in_route", followers:20000}, {publishedAt:"2026-01-01"}, null);
    if(notDelivered.value!==0) throw new Error("оценка не должна считаться до статуса «доставлено»");
    const notPublished = reachInfo({status:"delivered", followers:20000}, null, null);
    if(notPublished.value!==0) throw new Error("оценка не должна считаться без публикации");
  });

  // единственная сетевая проверка — health-check, только чтение, ничего не создаёт в базе
  try{
    const h = await Api.health();
    TestSuite.test("сервер отвечает на /api/health", ()=>{ if(h.ok!==true) throw new Error("health not ok"); });
    setConnStatus(true);
  }catch(e){
    TestSuite.test("сервер отвечает на /api/health", ()=>{ throw e; });
    setConnStatus(false);
  }

  TestSuite.run();
}
